<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2P Roguelike · Shop Exit & Mobile Layout</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background: #0a0a14; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', monospace; }
        .game-container {
            position: absolute; top: 50%; left: 50%; width: 1000px; height: 600px; border: 3px solid #333;
            border-radius: 12px; box-shadow: 0 0 40px rgba(233,68,96,0.2); background: #000;
            transform: translate(-50%, -50%) scale(1); transform-origin: center center;
        }
        canvas { display: block; width: 100%; height: 100%; border-radius: 9px; cursor: crosshair; touch-action: none; }
        .top-bar { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 20; background: rgba(0,0,0,0.6); border-radius: 30px; padding: 5px 12px; backdrop-filter: blur(4px); flex-wrap: wrap; justify-content: center; }
        .top-bar button { background: rgba(0,0,0,0.8); border: 1px solid #555; color: #ccc; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .top-bar button:hover { background: rgba(233,68,96,0.5); border-color: #e94560; color: #fff; }
        .restart-btn { border-color: #e94560; color: #e94560; } .restart-btn:hover { background: #e94560; color: #000; }
        .survival-btn { border-color: #33ff33; color: #33ff33; } .survival-btn:hover { background: #33ff33; color: #000; }
        .normal-btn { border-color: #f0a500; color: #f0a500; } .normal-btn:hover { background: #f0a500; color: #000; }
        .level2-btn { border-color: #ffaa00; color: #ffaa00; display: none; } .level2-btn:hover { background: #ffaa00; color: #000; }
        .home-btn { border-color: #8888cc; color: #8888cc; } .home-btn:hover { background: #8888cc; color: #000; }
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 30; display: flex; justify-content: center; align-items: center; }
        .overlay.hidden { display: none; }
        .panel { background: #16213e; border: 2px solid #444; border-radius: 16px; padding: 20px; max-width: 95%; width: 95%; color: #e0e0e0; max-height: 85%; overflow-y: auto; }
        .shop-panel { max-width: 800px; }
        .homescreen-panel { max-width: 500px; text-align: center; }
        .homescreen-title { font-size: 36px; color: #f0a500; text-shadow: 0 0 20px rgba(240,165,0,0.5); margin-bottom: 8px; letter-spacing: 1px; }
        .homescreen-subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
        .homescreen-stats { margin-bottom: 16px; color: #ccc; font-size: 14px; line-height: 1.6; }
        .homescreen-buttons { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .homescreen-btn { width: 220px; padding: 12px 24px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; border: 2px solid #555; transition: 0.2s; background: rgba(0,0,0,0.6); }
        .level1-hs-btn { color: #f0a500; border-color: #f0a500; } .level1-hs-btn:hover { background: #f0a500; color: #000; }
        .level2-hs-btn { color: #ffaa00; border-color: #ffaa00; } .level2-hs-btn:hover { background: #ffaa00; color: #000; }
        .survival-hs-btn { color: #33ff33; border-color: #33ff33; } .survival-hs-btn:hover { background: #33ff33; color: #000; }
        .shop-hs-btn { color: #66ccff; border-color: #66ccff; } .shop-hs-btn:hover { background: #66ccff; color: #000; }
        .settings-hs-btn { color: #ccc; border-color: #777; } .settings-hs-btn:hover { background: #777; color: #fff; }
        .homescreen-keys-hint { margin-top: 16px; color: #555; font-size: 11px; }
        .btn { padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; border: 1px solid #555; background: #333; color: #ccc; }
        .btn:hover { background: #444; }
        .btn-shop { background: #2a4c6e; padding: 6px 12px; border-radius: 20px; cursor: pointer; border: none; color: white; font-size: 12px; min-width: 80px; }
        .upgrade-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; gap: 6px; flex-wrap: wrap; }
        .victory-text { font-size: 32px; font-weight: bold; color: #f0a500; text-align: center; }
        .game-over-text { font-size: 32px; font-weight: bold; color: #ff4444; text-align: center; }
        .utility-indicator { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 12px; font-size: 11px; color: #ffcc88; z-index: 15; }
        .minimap { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; z-index: 15; width: 140px; height: 90px; }
        .wave-indicator { position: absolute; top: 50px; left: 20px; background: rgba(0,0,0,0.7); color: #ffcc88; padding: 4px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; z-index: 15; }
        .btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
        .mobile-controls { position: absolute; bottom: 20px; left: 0; right: 0; display: none; justify-content: space-between; align-items: flex-end; padding: 0 15px; pointer-events: none; z-index: 25; }
        .mobile-controls.active { display: flex; }
        .mobile-left { display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: auto; }
        .mobile-right { display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: auto; }
        .move-key-row { display: flex; align-items: center; gap: 12px; }
        .joystick-container { width: 130px; height: 130px; background: rgba(0,0,0,0.5); border-radius: 70px; position: relative; backdrop-filter: blur(4px); }
        .joystick-base { width: 100%; height: 100%; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; touch-action: none; }
        .joystick-thumb { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.5); position: absolute; transform: translate(-50%, -50%); left: 50%; top: 50%; pointer-events: none; }
        .shoot-area { position: relative; width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; }
        .action-btn { background: rgba(233,68,96,0.5); border: 2px solid rgba(255,255,255,0.5); border-radius: 40px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; touch-action: manipulation; font-size: 22px; }
        .action-btn:active { background: rgba(233,68,96,0.8); transform: scale(0.94); }
        .util-btn { background: rgba(100,100,200,0.5); }
        .shoot-main { width: 120px; height: 120px; border-radius: 65px; font-size: 36px; background: rgba(233,68,96,0.5); border: 3px solid rgba(255,255,255,0.5); }
        .reload-top { width: 50px; height: 50px; border-radius: 25px; background: rgba(233,68,96,0.5); }
        .swap-top { width: 50px; height: 50px; border-radius: 25px; background: rgba(100,100,200,0.5); }
        .pickup-left { position: absolute; left: -25px; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; border-radius: 30px; }
        .util-top-left { position: absolute; top: -25px; left: -25px; width: 48px; height: 48px; border-radius: 30px; }
        .key-btn { position: static; display: none; }
        .keybind-row { display: flex; justify-content: space-between; margin: 4px 0; }
        .keybind-row button { padding: 2px 8px; font-size: 11px; }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div class="utility-indicator" id="utilIndicator"></div>
    <canvas id="minimapCanvas" class="minimap" width="140" height="90"></canvas>
    <div class="top-bar">
        <button id="homeBtn" class="home-btn">🏠 Home</button>
        <button id="restartRunBtn" class="restart-btn">↺ Restart</button>
        <button id="normalModeBtn" class="normal-btn">🏰 Level 1</button>
        <button id="level2ModeBtn" class="level2-btn">⭐ Level 2</button>
        <button id="survivalModeBtn" class="survival-btn">⚔️ Survival</button>
        <button id="shopTopBtn">🛒 Shop</button>
        <button id="settingsBtn">⚙</button>
    </div>
    <div class="wave-indicator" id="waveIndicator" style="display:none;">Wave: 0</div>
    <div class="mobile-controls" id="mobileControls">
        <div class="mobile-left">
            <div class="action-btn util-btn swap-top" data-key="swap">⚔️</div>
            <div class="move-key-row">
                <div class="joystick-container" id="joystickContainer">
                    <div class="joystick-base" id="joystickBase">
                        <div class="joystick-thumb" id="joystickThumb"></div>
                    </div>
                </div>
                <div class="action-btn key-btn" data-key="key" id="keyBtnMobile">🔑</div>
            </div>
        </div>
        <div class="mobile-right">
            <div class="action-btn reload-top" data-key="reload">🔄</div>
            <div class="shoot-area">
                <div class="action-btn shoot-main" data-key="shoot">🔫</div>
                <div class="action-btn pickup-left" data-key="pickup">📦</div>
                <div class="action-btn util-btn util-top-left" data-key="util">✨</div>
            </div>
        </div>
    </div>
    <div id="homescreenOverlay" class="overlay">
        <div class="panel homescreen-panel">
            <h1 class="homescreen-title">⚔️ 2P ROGUELIKE ⚔️</h1>
            <p class="homescreen-subtitle">Co-op Dungeon Crawler</p>
            <div id="homescreenStats" class="homescreen-stats"></div>
            <div class="homescreen-buttons">
                <button id="homeLevel1Btn" class="homescreen-btn level1-hs-btn">🏰 Level 1</button>
                <button id="homeLevel2Btn" class="homescreen-btn level2-hs-btn" style="display:none;">⭐ Level 2</button>
                <button id="homeSurvivalBtn" class="homescreen-btn survival-hs-btn" style="display:none;">⚔️ Survival</button>
                <button id="homeShopBtn" class="homescreen-btn shop-hs-btn">🛒 Shop</button>
                <button id="homeSettingsBtn" class="homescreen-btn settings-hs-btn">⚙ Settings</button>
            </div>
            <p class="homescreen-keys-hint">WASD / Arrows · F / Period Shoot · R / Slash Reload · V / M Utility · E / P Pickup · Q / L Key · Tab / K Swap</p>
        </div>
    </div>
    <div id="settingsOverlay" class="overlay hidden"><div class="panel"><h2>⚙ SETTINGS</h2><div class="upgrade-row"><span>Players:</span><button id="playerCountBtn">2 Players</button></div><div class="upgrade-row"><span>Mobile Controls:</span><button id="mobileToggleBtn">Toggle</button></div><h3>Keybinds</h3><div id="keybindsContainer"></div><div class="btn-row"><button id="btnFullReset" class="btn">🗑️ Full Reset</button><button id="btnCloseSettings" class="btn">✕ Close</button></div></div></div>
    <div id="victoryOverlay" class="overlay hidden"><div class="panel"><div class="victory-text">🏆 VICTORY!</div><div id="victoryStats"></div><div class="btn-row"><button id="btnShopVictory">🛒 Shop</button><button id="btnPlayAgain">▶ Level 1</button><button id="btnNextLevel" style="display:none;">▶ Next Level</button><button id="btnReplayLevel2" style="display:none;">🔁 Replay Level 2</button><button id="btnSurvivalUnlock" style="display:none;">⚔️ Survival</button></div></div></div>
    <div id="gameOverOverlay" class="overlay hidden"><div class="panel"><div class="game-over-text">💀 GAME OVER 💀</div><div id="gameOverStats"></div><div class="btn-row"><button id="btnGameOverRestart">▶ Play Again</button><button id="btnGameOverShop">🛒 Shop</button></div><div class="btn-row"><button id="btnGameOverLevel1" class="btn">🏰 Level 1</button><button id="btnGameOverLevel2" class="btn" style="display:none;">⭐ Level 2</button></div></div></div>
    <div id="shopOverlay" class="overlay hidden"><div class="panel shop-panel"><h2>🛒 UPGRADE SHOP</h2><div id="shopStats"></div><div id="shopUpgrades"></div><div class="btn-row"><button id="btnLeaveShop">▶ Resume / New Run</button></div><div class="btn-row" style="margin-top:12px;"><button id="shopLevel1Btn" class="btn">🏰 Start Level 1</button><button id="shopLevel2Btn" class="btn" style="display:none;">⭐ Start Level 2</button><button id="shopSurvivalBtn" class="btn">⚔️ Start Survival</button></div></div></div>
</div>
<script>
(function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const minimapCanvas = document.getElementById('minimapCanvas');
    const minimapCtx = minimapCanvas.getContext('2d');
    const utilIndicator = document.getElementById('utilIndicator');
    const waveIndicator = document.getElementById('waveIndicator');
    const homeBtn = document.getElementById('homeBtn');
    const restartRunBtn = document.getElementById('restartRunBtn');
    const normalModeBtn = document.getElementById('normalModeBtn');
    const level2ModeBtn = document.getElementById('level2ModeBtn');
    const survivalModeBtn = document.getElementById('survivalModeBtn');
    const shopTopBtn = document.getElementById('shopTopBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const mobileToggleBtn = document.getElementById('mobileToggleBtn');
    const playerCountBtn = document.getElementById('playerCountBtn');
    const mobileControlsDiv = document.getElementById('mobileControls');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const gameOverStats = document.getElementById('gameOverStats');
    const victoryOverlay = document.getElementById('victoryOverlay');
    const victoryStats = document.getElementById('victoryStats');
    const shopOverlay = document.getElementById('shopOverlay');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const homescreenOverlay = document.getElementById('homescreenOverlay');
    const homescreenStats = document.getElementById('homescreenStats');
    const gameContainer = document.getElementById('gameContainer');
    const btnShopVictory = document.getElementById('btnShopVictory');
    const btnPlayAgain = document.getElementById('btnPlayAgain');
    const btnNextLevel = document.getElementById('btnNextLevel');
    const btnReplayLevel2 = document.getElementById('btnReplayLevel2');
    const btnSurvivalUnlock = document.getElementById('btnSurvivalUnlock');
    const btnLeaveShop = document.getElementById('btnLeaveShop');
    const btnGameOverRestart = document.getElementById('btnGameOverRestart');
    const btnGameOverShop = document.getElementById('btnGameOverShop');
    const btnGameOverLevel1 = document.getElementById('btnGameOverLevel1');
    const btnGameOverLevel2 = document.getElementById('btnGameOverLevel2');
    const btnFullReset = document.getElementById('btnFullReset');
    const btnCloseSettings = document.getElementById('btnCloseSettings');
    const shopStatsDiv = document.getElementById('shopStats');
    const shopUpgradesDiv = document.getElementById('shopUpgrades');
    const keybindsContainer = document.getElementById('keybindsContainer');
    const shopLevel1Btn = document.getElementById('shopLevel1Btn');
    const shopLevel2Btn = document.getElementById('shopLevel2Btn');
    const shopSurvivalBtn = document.getElementById('shopSurvivalBtn');
    const homeLevel1Btn = document.getElementById('homeLevel1Btn');
    const homeLevel2Btn = document.getElementById('homeLevel2Btn');
    const homeSurvivalBtn = document.getElementById('homeSurvivalBtn');
    const homeShopBtn = document.getElementById('homeShopBtn');
    const homeSettingsBtn = document.getElementById('homeSettingsBtn');
    const joystickContainer = document.getElementById('joystickContainer');
    const joystickBase = document.getElementById('joystickBase');
    const joystickThumb = document.getElementById('joystickThumb');
    const keyBtnMobile = document.getElementById('keyBtnMobile');

    function resizeGame() {
        const availableWidth = window.innerWidth;
        const availableHeight = window.innerHeight;
        const gameWidth = 1000, gameHeight = 600;
        const scale = Math.min(availableWidth / gameWidth, availableHeight / gameHeight);
        gameContainer.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }
    window.addEventListener('resize', resizeGame);
    resizeGame();

    let sharedCoins = 0, level2Unlocked = false, survivalUnlocked = false, gameRunning = false, gameWon = false, gameOver = false;
    let currentMode = 'normal', currentLevel = 1, bestTime = null, gameStartTime = 0, currentTime = 0;
    let mobileMode = false, isSettingsOpen = false, audioCtx = null;
    let playerCount = 2;
    let hasLeftStartRoom = false;
    let bossSurvivalCount = 0;
    let survivalHighscore = 0;
    let gameInitialized = false;
    let survivalHpMultiplier = 1;
    let survivalBombCount = 1;
    let joystickActive = false, joystickBaseRect = null;
    let mobileMoveX = 0, mobileMoveY = 0;

    let keybinds = {
        p1_up: 'KeyW', p1_down: 'KeyS', p1_left: 'KeyA', p1_right: 'KeyD',
        p1_shoot: 'KeyF', p1_reload: 'KeyR', p1_util: 'KeyV', p1_pickup: 'KeyE', p1_swap: 'Tab', p1_key: 'KeyQ',
        p2_up: 'ArrowUp', p2_down: 'ArrowDown', p2_left: 'ArrowLeft', p2_right: 'ArrowRight',
        p2_shoot: 'Period', p2_reload: 'Slash', p2_util: 'KeyM', p2_pickup: 'KeyP', p2_swap: 'KeyK', p2_key: 'KeyL'
    };
    function loadKeybinds(){ try{ const s=localStorage.getItem('rgKeybinds'); if(s) keybinds=JSON.parse(s); } catch(e){} }
    function saveKeybinds(){ localStorage.setItem('rgKeybinds', JSON.stringify(keybinds)); }
    loadKeybinds();

    function initAudio(){ if(!audioCtx) try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
    function playTone(f,t,d,v=0.08,r=true){ if(!audioCtx||audioCtx.state==='suspended')audioCtx?.resume(); const osc=audioCtx.createOscillator(),gain=audioCtx.createGain(); osc.type=t; osc.frequency.value=f; gain.gain.setValueAtTime(v,audioCtx.currentTime); if(r)gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+d); }
    const sfx={shoot:()=>playTone(800,'square',0.08),reload:()=>{playTone(400,'sine',0.15);setTimeout(()=>playTone(600,'sine',0.15),100)},explosion:()=>playTone(80,'sawtooth',0.4,0.18,false),pickup:()=>playTone(1200,'sine',0.1),heal:()=>playTone(500,'sine',0.3,0.07),barrier:()=>playTone(300,'square',0.2),grenade:()=>playTone(180,'triangle',0.2),melee:()=>playTone(100,'sawtooth',0.15,0.1,false),keyUse:()=>playTone(900,'sine',0.2),magnet:()=>playTone(600,'triangle',0.5,0.12),bossLaser:()=>playTone(200,'sawtooth',0.8,0.2,false),bossLaserCharge:()=>playTone(300,'sine',0.4,0.2,false),laserWarning:()=>playTone(150,'triangle',0.5,0.1,false)};

    function loadCoins(){ try{ const s=localStorage.getItem('rgc3'); if(s)sharedCoins=parseInt(s)||0; } catch(e){} }
    function saveCoins(){ localStorage.setItem('rgc3',sharedCoins); }
    function loadUnlocks(){ try{ level2Unlocked=localStorage.getItem('rgl23')==='1'; } catch(e){} try{ survivalUnlocked=localStorage.getItem('survivalUnlocked')==='1'; } catch(e){} try{ const bt=localStorage.getItem('rgbt3'); if(bt)bestTime=parseFloat(bt); } catch(e){} }
    function saveUnlocks(){ localStorage.setItem('rgl23',level2Unlocked?'1':'0'); localStorage.setItem('survivalUnlocked',survivalUnlocked?'1':'0'); if(bestTime) localStorage.setItem('rgbt3',bestTime.toString()); }
    function loadPlayerCount(){ try{ const s=localStorage.getItem('playerCount'); if(s)playerCount=parseInt(s)||2; } catch(e){} }
    function savePlayerCount(){ localStorage.setItem('playerCount',playerCount.toString()); }
    function loadSurvivalHighscore(){ try{ const s=localStorage.getItem('rgSurvivalHS'); if(s)survivalHighscore=parseInt(s)||0; } catch(e){} }
    function saveSurvivalHighscore(){ localStorage.setItem('rgSurvivalHS',survivalHighscore.toString()); }
    loadCoins(); loadUnlocks(); loadPlayerCount(); loadSurvivalHighscore();
    playerCountBtn.textContent = playerCount === 2 ? '2 Players' : '1 Player';
    playerCountBtn.onclick = () => { playerCount = playerCount === 2 ? 1 : 2; playerCountBtn.textContent = playerCount === 2 ? '2 Players' : '1 Player'; savePlayerCount(); };

    let su={hp:0,d:0,sp:0,cl:0,sk:0,pc:{hp:0,d:0,sp:0,cl:0,sk:0}};
    let pwd=[{sw:'pistol',ow:['pistol']},{sw:'pistol',ow:['pistol']}];
    function loadUpgrades(){ try{ const s=localStorage.getItem('rgu_full4'); if(s){ const d=JSON.parse(s); su=d.su||su; pwd=d.pwd||pwd; } } catch(e){} }
    function saveUpgrades(){ localStorage.setItem('rgu_full4',JSON.stringify({su,pwd})); }
    loadUpgrades();

    let keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    function setupJoystick() {
        const base = joystickBase;
        const thumb = joystickThumb;
        const maxRadius = 35;

        function handleStart(e) {
            e.preventDefault();
            if (!mobileMode) return;
            const touch = e.touches[0];
            joystickActive = true;
            joystickBaseRect = base.getBoundingClientRect();
            updateJoystick(touch.clientX, touch.clientY);
        }

        function handleMove(e) {
            e.preventDefault();
            if (!joystickActive || !mobileMode) return;
            const touch = e.touches[0];
            updateJoystick(touch.clientX, touch.clientY);
        }

        function handleEnd(e) {
            e.preventDefault();
            joystickActive = false;
            mobileMoveX = 0;
            mobileMoveY = 0;
            thumb.style.left = '50%';
            thumb.style.top = '50%';
        }

        function updateJoystick(clientX, clientY) {
            const rect = joystickBaseRect;
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const dist = Math.hypot(dx, dy);
            if (dist > maxRadius) {
                dx = (dx / dist) * maxRadius;
                dy = (dy / dist) * maxRadius;
            }
            thumb.style.left = `calc(50% + ${dx}px)`;
            thumb.style.top = `calc(50% + ${dy}px)`;
            mobileMoveX = dist > 5 ? dx / maxRadius : 0;
            mobileMoveY = dist > 5 ? dy / maxRadius : 0;
        }

        base.addEventListener('touchstart', handleStart, {passive: false});
        base.addEventListener('touchmove', handleMove, {passive: false});
        base.addEventListener('touchend', handleEnd);
        base.addEventListener('touchcancel', handleEnd);
    }

    function setMobileMode(enabled){
        mobileMode = enabled;
        mobileControlsDiv.classList.toggle('active', enabled);
        canvas.style.touchAction = enabled ? 'none' : 'auto';
        if (!enabled) {
            for(let k of ['KeyW','KeyS','KeyA','KeyD','KeyF','KeyR','KeyV','Tab','KeyE','KeyQ']) keys[k] = false;
            joystickActive = false;
            mobileMoveX = 0; mobileMoveY = 0;
            joystickThumb.style.left = '50%'; joystickThumb.style.top = '50%';
        }
        localStorage.setItem('mobile_mode', enabled?'1':'0');
    }
    if(localStorage.getItem('mobile_mode')==='1') setMobileMode(true);
    mobileToggleBtn.onclick = () => setMobileMode(!mobileMode);
    setupJoystick();

    const mobileActionMap = { shoot:'KeyF', reload:'KeyR', pickup:'KeyE', util:'KeyV', swap:'Tab', key:'KeyQ' };
    function setupMobileButtons() {
        document.querySelectorAll('.action-btn').forEach(btn => {
            const a = btn.dataset.key;
            if (!a) return;
            const code = mobileActionMap[a];
            if (!code) return;
            btn.addEventListener('pointerdown', e => {
                e.preventDefault();
                if (mobileMode) keys[code] = true;
            });

    function generateNormalMap(level){

    function buildWalls(){

    function spawnRandomBoxes(count) {

            let attempts = 0;
            while (attempts < 20) {
                const x = WL + 30 + Math.random() * (MW - 2*WL - 60);
                const y = WL + 30 + Math.random() * (MH - 2*WL - 60);

                for (const p of players) if (p.alive && Math.hypot(p.x - x, p.y - y) < 50) { overlap = true; break; }

    class BossLaserBeam {
        constructor(corners, isWarning = false) {
            this.alive = true;
            this.life = isWarning ? 1.0 : 0.6;
            this.isWarning = isWarning;

            this.damageInterval = 0.15;

        }
        static createFromBoss(bossX, bossY, targetX, targetY, bossR, isWarning = false) {
            const dx = targetX - bossX, dy = targetY - bossY;
            const dist = Math.hypot(dx, dy) || 1;
            const dirX = dx / dist, dirY = dy / dist;
            const perpX = -dirY, perpY = dirX;
            const length = RW * 1.5;
            const halfWidth = bossR;
            const startX = bossX + dirX * bossR * 0.5;
            const startY = bossY + dirY * bossR * 0.5;
            const endX = startX + dirX * length;
            const endY = startY + dirY * length;
            const corners = [
                {x: startX + perpX * halfWidth, y: startY + perpY * halfWidth},
                {x: startX - perpX * halfWidth, y: startY - perpY * halfWidth},
                {x: endX - perpX * halfWidth, y: endY - perpY * halfWidth},
                {x: endX + perpX * halfWidth, y: endY + perpY * halfWidth}

            return new BossLaserBeam(corners, isWarning);
        }
        update(dt, players) {
            this.life -= dt;
            if (this.life <= 0) { this.alive = false; return; }
            if (this.isWarning) return;
            this.lastDamageTime += dt;
            if (this.lastDamageTime >= this.damageInterval) {
                this.lastDamageTime = 0;
                for (const p of players) {
                    if (!p.alive) continue;
                    if (this.pointInPolygon(p.x, p.y)) p.hurt(5);
                }
            }
        }
        pointInPolygon(px, py) {
            let inside = false;
            const n = this.corners.length;
            for (let i = 0, j = n - 1; i < n; j = i++) {
                const xi = this.corners[i].x, yi = this.corners[i].y;
                const xj = this.corners[j].x, yj = this.corners[j].y;
                const intersect = ((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }
        draw(ctx, cam) {
            if (!this.alive) return;
            ctx.globalAlpha = this.isWarning ? 0.35 : 0.45;
            ctx.fillStyle = this.isWarning ? '#ffaa00' : '#ff00ff';
            ctx.beginPath();
            ctx.moveTo(this.corners[0].x - cam.x + CW/2, this.corners[0].y - cam.y + CH/2);
            for (let i = 1; i < 4; i++) ctx.lineTo(this.corners[i].x - cam.x + CW/2, this.corners[i].y - cam.y + CH/2);
            ctx.closePath();
            ctx.fill();
            if (this.isWarning) {
                ctx.globalAlpha = 0.7;
                ctx.strokeStyle = '#ffcc00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
        }
    }

    let lastTime=performance.now();
    function update(dt){
        if(!gameRunning||gameWon||isSettingsOpen) return;
        const cap=Math.min(dt,0.1);
        if(currentMode==='normal') currentTime=performance.now()/1000-gameStartTime;
        if(keys['KeyT']){ keys['KeyT'] = false; for(const s of spawners){ if(s.alive) s.spawnEnemy(); } }
        if(keys['KeyN'] && currentMode==='survival'){ keys['KeyN'] = false; startWaveSurvival(); }

                dy = mobileMoveY;
            } else {

                if(keys[keybinds[prefix+'up']]) dy--;
                if(keys[keybinds[prefix+'down']]) dy++;

            }

            if(keys[keybinds[p.id===0?'p1_reload':'p2_reload']] && p.ammo<p.maxAmmo) p.startReload();

            if(keys[keybinds[p.id===0?'p1_key':'p2_key']]){ p.useKey(); keys[keybinds[p.id===0?'p1_key':'p2_key']]=false; }
            if(keys[keybinds[p.id===0?'p1_pickup':'p2_pickup']] && p.pickupCooldown<=0){
                const items = [];
                for(const w of weaponPickups) if(w.alive) items.push({type:'weapon', dist:Math.hypot(p.x-w.x, p.y-w.y), ref:w});
                for(const m of meleePickups) if(m.alive) items.push({type:'melee', dist:Math.hypot(p.x-m.x, p.y-m.y), ref:m});
                for(const u of utilityPickups) if(u.alive) items.push({type:'utility', dist:Math.hypot(p.x-u.x, p.y-u.y), ref:u});
                items.sort((a,b)=>a.dist-b.dist);
                if(items.length>0 && items[0].dist < 55){
                    const item = items[0];
                    if(item.type === 'weapon'){ item.ref.alive = false; p.weaponType = item.ref.type; p.ammo = Math.floor(WEAPONS[item.ref.type].a * p.clipMult); sfx.pickup(); }
                    else if(item.type === 'melee'){ item.ref.alive = false; p.meleeWeapon = item.ref.type; sfx.pickup(); }
                    else if(item.type === 'utility'){ item.ref.alive = false; p.pickUpUtil(item.ref.type); }
                    p.pickupCooldown = 0.15;
                }
                keys[keybinds[p.id===0?'p1_pickup':'p2_pickup']] = false;
            }
            if(dx||dy){ const m=Math.hypot(dx,dy); p.move(dx/m,dy/m,cap); }
        }
        for(const p of players){
            if(!p.alive) continue;
            for(let i=keyPickups.length-1;i>=0;i--) if(keyPickups[i]?.alive&&Math.hypot(p.x-keyPickups[i].x,p.y-keyPickups[i].y)<p.radius+55){ keyPickups[i].alive=false; p.pickUpKey(); }
            for(let i=magnetPickups.length-1;i>=0;i--) if(magnetPickups[i].alive&&Math.hypot(p.x-magnetPickups[i].x,p.y-magnetPickups[i].y)<p.radius+55){ magnetPickups[i].alive=false; p.magnetTimer = 10; sfx.magnet(); }

            for(const item of allItems){ if(!item.alive) continue; const dx = p.x - item.x, dy = p.y - item.y, dist = Math.hypot(dx, dy); if(dist < 1) continue; const speed = 400 * cap; const move = Math.min(speed, dist); item.x += (dx/dist) * move; item.y += (dy/dist) * move; }

        }
        for(const w of weaponPickups) w.update(cap); weaponPickups = weaponPickups.filter(w=>w.alive);
        for(const h of healthPickups) h.update(cap); healthPickups = healthPickups.filter(h=>h.alive);
        for(let i=0;i<bullets.length;i++) bullets[i].update(cap); bullets=bullets.filter(b=>b.alive);
        for(let i=0;i<grenades.length;i++) grenades[i].update(cap); grenades=grenades.filter(g=>g.alive);
        for(let i=0;i<activeFields.length;i++) activeFields[i].update(cap); activeFields=activeFields.filter(f=>f.alive);
        for(let i=0;i<activeBarriers.length;i++) activeBarriers[i].update(cap); activeBarriers=activeBarriers.filter(b=>b.alive);
        for(let i=0;i<activeMines.length;i++) activeMines[i].update(cap); activeMines=activeMines.filter(m=>m.alive);
        for(let i=0;i<weaponRacks.length;i++) weaponRacks[i].update(cap);
        for(let i=0;i<laserWarnings.length;i++) laserWarnings[i].update(cap, players);
        laserWarnings = laserWarnings.filter(b=>b.alive);
        for(let i=0;i<laserBeams.length;i++) laserBeams[i].update(cap, players);

        for(const b of bossBombs){ if(!b.alive) continue; b.timer-=cap; if(b.timer<=0){ b.alive=false; shake=8; sfx.explosion(); spawnParticles(b.x,b.y,'#ff4400',10); explosionCircles.push({x:b.x,y:b.y,life:0.4,radius:b.radius}); for(const p of players) if(p.alive&&Math.hypot(p.x-b.x,p.y-b.y)<b.radius) p.hurt(2); damageObstaclesInRadius(b.x,b.y,b.radius); } } bossBombs=bossBombs.filter(b=>b.alive);

            for(let i=healthPickups.length-1;i>=0;i--) if(healthPickups[i]?.alive&&Math.hypot(p.x-healthPickups[i].x,p.y-healthPickups[i].y)<p.radius+55&&p.hp<p.maxHp){ healthPickups[i].alive=false; p.hp=Math.min(p.maxHp,p.hp+2); sfx.heal(); }
            if(currentMode==='normal'){ const room=roomAt(p.x,p.y); if(room) explored[room.col][room.row]=true; if(room&&room.col===0&&room.row===0&&p.hp<p.maxHp) p.hp=Math.min(p.maxHp,p.hp+0.5*cap); }
        }
        coins=coins.filter(c=>c.alive); healthPickups=healthPickups.filter(h=>h.alive); utilityPickups=utilityPickups.filter(u=>u.alive); meleePickups=meleePickups.filter(m=>m.alive); keyPickups=keyPickups.filter(k=>k.alive); magnetPickups=magnetPickups.filter(m=>m.alive);
        for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.life-=cap; if(p.life<=0) particles.splice(i,1); else{ p.x+=p.vx*cap; p.y+=p.vy*cap; } }
        for(let i=explosionCircles.length-1;i>=0;i--){ explosionCircles[i].life-=cap; if(explosionCircles[i].life<=0) explosionCircles.splice(i,1); }
        for(let i=meleeEffects.length-1;i>=0;i--){ meleeEffects[i].life-=cap; if(meleeEffects[i].life<=0) meleeEffects.splice(i,1); }
        let sx=0,sy=0,cnt=0; for(const p of players) if(p.alive){ sx+=p.x; sy+=p.y; cnt++; } if(cnt>0){ camera.x+=(sx/cnt-camera.x)*6*cap; camera.y+=(sy/cnt-camera.y)*6*cap; }
        camera.x=Math.max(CW/2,Math.min(MW-CW/2,camera.x)); camera.y=Math.max(CH/2,Math.min(MH-CH/2,camera.y)); shake*=0.85;
        if(currentMode==='normal'&&bossDefeated){
            for(const p of players) if(p.alive&&Math.hypot(p.x-exitPos.x,p.y-exitPos.y)<p.radius+20){
                if(currentLevel===1&&currentTime<30){ level2Unlocked=true; saveUnlocks(); initGame('normal',2); gameStartTime=performance.now()/1000; currentTime=0; bossDefeated=false; gameWon=false; gameRunning=true; }
                else {
                    if(currentLevel===2){ survivalUnlocked=true; saveUnlocks(); }
                    gameWon=true; gameRunning=false; if(bestTime===null||currentTime<bestTime) bestTime=currentTime; saveUnlocks(); saveCoins();
                    victoryStats.innerHTML=`⏱️ Time: ${currentTime.toFixed(1)}s<br>🏆 Best: ${bestTime?bestTime.toFixed(1):'--'}s`;
                    btnNextLevel.style.display = (currentLevel===1 && level2Unlocked) ? 'inline-block' : 'none';

        if(currentMode==='survival' && players.every(p=>!p.alive) && performance.now()/1000 - gameStartTime > 5){
            gameRunning=false; gameOver=true;
            if(wave > survivalHighscore){ survivalHighscore = wave; saveSurvivalHighscore(); }
            gameOverStats.innerHTML=`🏆 Wave ${wave}<br>⭐ Best: ${survivalHighscore}<br>🪙 Coins collected: ${sharedCoins}`;
            btnGameOverLevel2.style.display = level2Unlocked ? 'inline-block' : 'none';
            gameOverOverlay.classList.remove('hidden');
            hasLeftStartRoom = false; updateUIButtons();
        }
        updateKeyButtonVisibility();
    }

    function drawPlayer(ctx,p,cam){
        if(!p.alive) return; const sx=p.x-cam.x+CW/2, sy=p.y-cam.y+CH/2; ctx.save(); ctx.translate(sx,sy);
        const ba=Math.atan2(p.facingY,p.facingX)+Math.PI; ctx.rotate(ba);
        if(p.meleeWeapon==='sword'){ ctx.fillStyle='#aaccff'; ctx.fillRect(-2,8,4,18); ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(0,8,3,0,Math.PI*2); ctx.fill(); }
        else if(p.meleeWeapon==='axe'){ ctx.fillStyle='#aa8866'; ctx.fillRect(-3,8,6,18); ctx.fillStyle='#ffaa66'; ctx.beginPath(); ctx.arc(0,8,4,0,Math.PI*2); ctx.fill(); }
        else if(p.meleeWeapon==='waraxe'){ ctx.fillStyle='#cc8866'; ctx.fillRect(-4,8,8,22); ctx.fillStyle='#ff8844'; ctx.beginPath(); ctx.arc(0,8,5,0,Math.PI*2); ctx.fill(); }
        else{ ctx.fillStyle='#ffccaa'; ctx.fillRect(-1,6,2,14); ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(0,6,2,0,Math.PI*2); ctx.fill(); }
        ctx.rotate(-ba); ctx.rotate(Math.atan2(p.facingY,p.facingX)); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(0,0,p.radius,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#888'; ctx.fillRect(p.radius-2,-3,10,6); ctx.restore();
        const ratio=p.hp/p.maxHp; const bc=ratio>0.6?'#44ff44':(ratio>0.3?'#ffaa00':'#ff4444'); ctx.fillStyle='#333'; ctx.fillRect(sx-14,sy-p.radius-10,28,4); ctx.fillStyle=bc; ctx.fillRect(sx-14,sy-p.radius-10,28*ratio,4);
        if(p.magnetTimer > 0) { ctx.globalAlpha = 0.2 + Math.sin(performance.now()/100)*0.1; ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(sx, sy, p.radius+10, 0, Math.PI*2); ctx.stroke(); ctx.globalAlpha = 1; }
    }

    function render(){
        ctx.clearRect(0,0,CW,CH);
        if(!gameInitialized && !gameRunning){ ctx.fillStyle='#0a0a14'; ctx.fillRect(0,0,CW,CH); ctx.fillStyle='#f0a500'; ctx.font='bold 28px monospace'; ctx.textAlign='center'; ctx.fillText('⚔️ 2P ROGUELIKE ⚔️', CW/2, CH/2-10); ctx.fillStyle='#666'; ctx.font='14px monospace'; ctx.fillText('Select a mode to begin', CW/2, CH/2+30); ctx.textAlign='left'; return; }
        const shakeX=shake*(Math.random()-0.5)*2, shakeY=shake*(Math.random()-0.5)*2; const cam={x:camera.x+shakeX, y:camera.y+shakeY};
        if(currentMode==='normal'){ for(let r=0;r<GR;r++) for(let c=0;c<GC;c++){ const rm=getRoom(c,r); ctx.fillStyle=explored[c][r]?'#1a1a2e':'#000'; ctx.fillRect(rm.left-cam.x+CW/2, rm.top-cam.y+CH/2, RW, RH); } } else { for(let r=0;r<GR;r++) for(let c=0;c<GC;c++){ const rm=getRoom(c,r); ctx.fillStyle='#1a1a2e'; ctx.fillRect(rm.left-cam.x+CW/2, rm.top-cam.y+CH/2, RW, RH); } }
        for(const w of walls){ ctx.fillStyle = '#3a3a4a'; ctx.fillRect(w.x-cam.x+CW/2, w.y-cam.y+CH/2, w.w, w.h); }
        if(bossDefeated && exitPos && currentMode==='normal'){
            const sx = exitPos.x - cam.x + CW/2, sy = exitPos.y - cam.y + CH/2;
            const pulse = Math.sin(performance.now() / 300) * 0.3 + 0.7;
            ctx.fillStyle = '#f0a500'; ctx.globalAlpha = pulse; ctx.fillRect(sx-20, sy-28, 40, 56);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.fillText('EXIT', sx, sy-8); ctx.textAlign = 'left'; ctx.globalAlpha = 1;
        }
        for(const o of obstacles) if(isExplored(o.x+o.w/2, o.y+o.h/2)) o.draw(ctx,cam);
        for(const s of spawners) if(isExplored(s.x, s.y)) s.draw(ctx,cam);
        for(const e of enemies) if(isExplored(e.x, e.y)) e.draw(ctx,cam);
        for(const r of weaponRacks) if(isExplored(r.x, r.y)) r.draw(ctx,cam);
        for(const f of activeFields) f.draw(ctx,cam); for(const b of activeBarriers) b.draw(ctx,cam);
        for(const m of activeMines) if(isExplored(m.x, m.y)) m.draw(ctx,cam); for(const g of grenades) if(isExplored(g.x, g.y)) g.draw(ctx,cam);
        for(const b of bullets) b.draw(ctx,cam);
        for(const c of coins) if(isExplored(c.x, c.y)) c.draw(ctx,cam);
        for(const h of healthPickups) if(isExplored(h.x, h.y)) h.draw(ctx,cam);
        for(const w of weaponPickups) if(isExplored(w.x, w.y)) w.draw(ctx,cam);
        for(const u of utilityPickups) if(isExplored(u.x, u.y)) u.draw(ctx,cam);
        for(const m of meleePickups) if(isExplored(m.x, m.y)) m.draw(ctx,cam);
        for(const k of keyPickups) if(isExplored(k.x, k.y)) k.draw(ctx,cam);
        for(const t of thrownEnemies) if(isExplored(t.x, t.y)) t.draw(ctx,cam);
        for(const lw of laserWarnings) lw.draw(ctx, cam);
        for(const lb of laserBeams) lb.draw(ctx, cam);
        for(const b of bossBombs){ if(!b.alive) continue; ctx.globalAlpha=0.4+Math.sin(b.timer*10)*0.2; ctx.fillStyle='#ff4400'; ctx.beginPath(); ctx.arc(b.x-cam.x+CW/2, b.y-cam.y+CH/2, b.radius, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
        for(const c of explosionCircles){ ctx.globalAlpha=c.life/0.5; ctx.strokeStyle='#ff4444'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(c.x-cam.x+CW/2, c.y-cam.y+CH/2, c.radius, 0, Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
        for(const m of meleeEffects){ ctx.globalAlpha=m.life/0.15; ctx.fillStyle=m.color; ctx.beginPath(); ctx.moveTo(m.x-cam.x+CW/2, m.y-cam.y+CH/2); const fa=Math.atan2(m.facingY,m.facingX); ctx.arc(m.x-cam.x+CW/2, m.y-cam.y+CH/2, m.radius, fa-(m.angle/2)*(Math.PI/180), fa+(m.angle/2)*(Math.PI/180)); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1; }
        for(const p of players) drawPlayer(ctx,p,cam);
        for(const m of magnetPickups) if(isExplored(m.x, m.y)) m.draw(ctx, cam);
        const allBosses = enemies.filter(e => e.alive && e.type === 'boss');
        if (allBosses.length > 0 && (currentMode === 'normal' ? isExplored(allBosses[0].x, allBosses[0].y) : true)) {
            const barH = 12, barW = CW - 20, startY = 3, gap = 2;
            allBosses.forEach((boss, idx) => {
                const barY = startY + idx * (barH + gap);
                ctx.fillStyle = '#333'; ctx.fillRect(10, barY, barW, barH);
                const hpRatio = boss.hp / boss.maxHp; ctx.fillStyle = '#ff4444'; ctx.fillRect(10, barY, barW * hpRatio, barH);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.fillText(`BOSS ${Math.ceil(boss.hp)}/${boss.maxHp}`, CW/2, barY + barH - 2); ctx.textAlign = 'left';
            });
        }
        ctx.fillStyle='#fff'; ctx.font='bold 18px monospace'; ctx.fillText(`🪙 ${sharedCoins}`, 20, 35);
        if(currentMode==='normal'){ const dt=gameWon?currentTime:(performance.now()/1000-gameStartTime); ctx.fillText(`⏱️ ${dt.toFixed(1)}s`, 220, 35); if(currentLevel===2) ctx.fillText('LEVEL 2', 400, 35); } else { ctx.fillText(`WAVE ${wave}`, 220, 35); ctx.textAlign = 'right'; ctx.fillText(`Next: ${Math.max(0,(waveInterval-waveTimer)).toFixed(1)}s`, CW-20, 35); ctx.textAlign = 'left'; }
        for(let i=0;i<players.length;i++){ const p=players[i], x=i===0?16:CW-16; ctx.fillStyle=i===0?'#4da6ff':'#ff6b6b'; ctx.font='bold 13px monospace'; ctx.textAlign=i===0?'left':'right'; ctx.fillText(`P${i+1} ❤️${Math.floor(p.hp)}/${p.maxHp} ${p.weapon.n} ${p.reloading?'RELOAD':p.ammo+'/'+p.maxAmmo} ${p.activeWeapon===0?'🔫':(p.meleeWeapon==='waraxe'?'⚔️':(p.meleeWeapon==='axe'?'🪓':'🗡️'))} 🔑${p.keys} ${p.currentUtil?UN[p.currentUtil]+':'+p.utilCharges:'⛔'} ${p.magnetTimer>0?'🧲':''}`, x, 20); }
        ctx.textAlign='left';
        utilIndicator.innerText = players[0]?.currentUtil ? `${UN[players[0].currentUtil]}:${players[0].utilCharges}` : '';
        minimapCtx.clearRect(0,0,140,90); const mmX=140/MW, mmY=90/MH;
        if(currentMode==='normal'){ for(let r=0;r<GR;r++) for(let c=0;c<GC;c++) if(explored[c][r]){ const rm=getRoom(c,r); minimapCtx.fillStyle='rgba(255,255,255,0.6)'; minimapCtx.fillRect(rm.left*mmX, rm.top*mmY, RW*mmX, RH*mmY); } }
        for(const p of players) if(p.alive){ minimapCtx.fillStyle=p.color; minimapCtx.beginPath(); minimapCtx.arc(p.x*mmX, p.y*mmY, 2.5, 0, Math.PI*2); minimapCtx.fill(); }
        if(exitPos&&currentMode==='normal'){ minimapCtx.fillStyle='#f0a500'; minimapCtx.fillRect(exitPos.x*mmX-2, exitPos.y*mmY-2, 5, 5); }
    }

    function showShop(){
        shopStatsDiv.innerHTML=`<div>💰 Coins: ${sharedCoins}</div>`; shopUpgradesDiv.innerHTML='';
        const sdiv=document.createElement('div');
        sdiv.innerHTML=`<h3>Shared Upgrades</h3><div class="upgrade-row">❤️ HP +1 (${su.hp}) <button class="btn-shop" data-up="hp">${30+su.pc.hp*15}🪙</button></div><div class="upgrade-row">💥 Damage +0.5 (${su.d}) <button class="btn-shop" data-up="d">${30+su.pc.d*15}🪙</button></div><div class="upgrade-row">⚡ Speed +15% (${su.sp}) <button class="btn-shop" data-up="sp">${30+su.pc.sp*15}🪙</button></div><div class="upgrade-row">📦 Clip +20% (${su.cl}) <button class="btn-shop" data-up="cl">${30+su.pc.cl*15}🪙</button></div><div class="upgrade-row">🔑 Keys +1 (${su.sk}) <button class="btn-shop" data-up="sk">${40+su.pc.sk*15}🪙</button></div><div class="upgrade-row"><button id="cheatCoinBtn" class="btn-shop">💎 +100 Coins</button></div>`;
        shopUpgradesDiv.appendChild(sdiv);
        for(let idx=0;idx<2;idx++){ const wd=pwd[idx]; const d=document.createElement('div'); d.innerHTML=`<h3>Player ${idx+1}</h3><div>Starter Gun: <select id="sg_${idx}">${wd.ow.map(w=>`<option value="${w}" ${wd.sw===w?'selected':''}>${WEAPONS[w].n}</option>`).join('')}</select></div><h4>Buy Weapons</h4>`; Object.keys(WEAPONS).forEach(w=>{ if(!wd.ow.includes(w)){ d.innerHTML+=`<div class="upgrade-row">${WEAPONS[w].n} <button class="btn-shop buy-specific" data-p="${idx}" data-weapon="${w}">${WPRICES[w]}🪙</button></div>`; } }); shopUpgradesDiv.appendChild(d); }
        document.getElementById('cheatCoinBtn').onclick=()=>{ sharedCoins+=100; saveCoins(); showShop(); };
        document.querySelectorAll('.btn-shop:not(.buy-specific)').forEach(b=>{ b.onclick=()=>{ const t=b.dataset.up; let cost=30; let count=su.pc[t]||0; if(t==='sk') cost=40; cost+=count*15; if(sharedCoins>=cost){ if(t==='hp' || (t==='d'&&su.d<100) || (t==='sp'&&su.sp<7) || (t==='cl'&&su.cl<100) || (t==='sk'&&su.sk<20)){ sharedCoins-=cost; saveCoins(); if(t==='hp') su.hp++; else if(t==='d') su.d++; else if(t==='sp') su.sp++; else if(t==='cl') su.cl++; else if(t==='sk') su.sk++; su.pc[t]=(su.pc[t]||0)+1; saveUpgrades(); showShop(); } } }; });
        document.querySelectorAll('.buy-specific').forEach(b=>{ b.onclick=()=>{ const pIdx=parseInt(b.dataset.p); const w=b.dataset.weapon; const price=WPRICES[w]; if(sharedCoins>=price){ sharedCoins-=price; saveCoins(); if(!pwd[pIdx].ow.includes(w)) pwd[pIdx].ow.push(w); saveUpgrades(); showShop(); } }; });
        for(let idx=0;idx<2;idx++){ const sel=document.getElementById(`sg_${idx}`); if(sel) sel.onchange=()=>{ pwd[idx].sw=sel.value; saveUpgrades(); }; }
        shopLevel2Btn.style.display = level2Unlocked ? 'inline-block' : 'none';
        shopOverlay.classList.remove('hidden'); gameRunning=false;
    }

    function updateUIButtons(){
        if(!gameInitialized && !gameRunning){ homeBtn.style.display='none'; restartRunBtn.style.display='none'; normalModeBtn.style.display='none'; level2ModeBtn.style.display='none'; survivalModeBtn.style.display='none'; shopTopBtn.style.display='inline-block'; settingsBtn.style.display='inline-block'; }
        else { homeBtn.style.display='inline-block'; restartRunBtn.style.display='inline-block'; if(currentMode==='survival'){ shopTopBtn.style.display='inline-block'; survivalModeBtn.style.display='inline-block'; normalModeBtn.style.display='none'; level2ModeBtn.style.display='none'; } else { if(hasLeftStartRoom){ normalModeBtn.style.display='none'; level2ModeBtn.style.display='none'; shopTopBtn.style.display='none'; } else { normalModeBtn.style.display='inline-block'; if(level2Unlocked) level2ModeBtn.style.display='inline-block'; else level2ModeBtn.style.display='none'; shopTopBtn.style.display='inline-block'; } survivalModeBtn.style.display='inline-block'; } settingsBtn.style.display='inline-block'; }
    }

    function buildKeybindUI(){
        keybindsContainer.innerHTML = '';
        const actions = { 'p1_up':'P1 Up','p1_down':'P1 Down','p1_left':'P1 Left','p1_right':'P1 Right','p1_shoot':'P1 Shoot','p1_reload':'P1 Reload','p1_util':'P1 Utility','p1_pickup':'P1 Pickup','p1_swap':'P1 Swap','p1_key':'P1 Key','p2_up':'P2 Up','p2_down':'P2 Down','p2_left':'P2 Left','p2_right':'P2 Right','p2_shoot':'P2 Shoot','p2_reload':'P2 Reload','p2_util':'P2 Utility','p2_pickup':'P2 Pickup','p2_swap':'P2 Swap','p2_key':'P2 Key' };
        for(const [bind, label] of Object.entries(actions)){
            const row = document.createElement('div'); row.className='keybind-row';
            const span = document.createElement('span'); span.textContent=label;
            const btn = document.createElement('button'); btn.textContent=keybinds[bind];
            btn.onclick=()=>{ btn.textContent='Press key...'; const listener=e=>{ e.preventDefault(); keybinds[bind]=e.code; saveKeybinds(); btn.textContent=e.code; window.removeEventListener('keydown',listener); }; window.addEventListener('keydown',listener,{once:true}); };
            row.appendChild(span); row.appendChild(btn); keybindsContainer.appendChild(row);
        }
    }

    shopLevel1Btn.onclick=()=>{ shopOverlay.classList.add('hidden'); initGame('normal',1); };
    shopLevel2Btn.onclick=()=>{ shopOverlay.classList.add('hidden'); if(level2Unlocked) initGame('normal',2); };
    shopSurvivalBtn.onclick=()=>{ shopOverlay.classList.add('hidden'); initGame('survival'); };
    homeLevel1Btn.onclick=()=>{ initGame('normal',1); };
    homeLevel2Btn.onclick=()=>{ if(level2Unlocked) initGame('normal',2); };
    homeSurvivalBtn.onclick=()=>{ initGame('survival'); };
    homeShopBtn.onclick=()=>{ showShop(); };
    homeSettingsBtn.onclick=()=>{ initAudio(); isSettingsOpen=true; buildKeybindUI(); settingsOverlay.classList.remove('hidden'); gameRunning=false; };
    homeBtn.onclick=()=>{ goHome(); };
    restartRunBtn.onclick=()=>{ initGame(currentMode,currentLevel); };
    normalModeBtn.onclick=()=>{ initGame('normal',1); };
    level2ModeBtn.onclick=()=>{ if(level2Unlocked) initGame('normal',2); };
    survivalModeBtn.onclick=()=>{ initGame('survival'); };
    shopTopBtn.onclick=()=>{ showShop(); };
    btnShopVictory.onclick=()=>{ victoryOverlay.classList.add('hidden'); showShop(); };
    btnPlayAgain.onclick=()=>{ victoryOverlay.classList.add('hidden'); initGame('normal',1); };
    btnNextLevel.onclick=()=>{ victoryOverlay.classList.add('hidden'); initGame('normal',2); };
    btnReplayLevel2.onclick=()=>{ victoryOverlay.classList.add('hidden'); initGame('normal',2); };
    btnSurvivalUnlock.onclick=()=>{ victoryOverlay.classList.add('hidden'); initGame('survival'); };
    btnGameOverRestart.onclick=()=>{ gameOverOverlay.classList.add('hidden'); initGame('survival'); };
    btnGameOverShop.onclick=()=>{ gameOverOverlay.classList.add('hidden'); showShop(); };
    btnGameOverLevel1.onclick=()=>{ gameOverOverlay.classList.add('hidden'); initGame('normal',1); };
    btnGameOverLevel2.onclick=()=>{ gameOverOverlay.classList.add('hidden'); if(level2Unlocked) initGame('normal',2); };
    btnLeaveShop.onclick=()=>{
        shopOverlay.classList.add('hidden');
        if(gameWon || gameOver){
            gameWon = false; gameOver = false;
            goHome();
        } else if(!gameInitialized){
            goHome();
        } else {
            gameRunning = true;
            updateUIButtons();
        }
    };
    btnFullReset.onclick=()=>{ localStorage.clear(); location.reload(); };
    btnCloseSettings.onclick=()=>{ settingsOverlay.classList.add('hidden'); isSettingsOpen=false; if(!gameInitialized){ gameRunning=false; } else { gameRunning=true; } };
    settingsBtn.onclick=()=>{ initAudio(); isSettingsOpen=true; buildKeybindUI(); settingsOverlay.classList.remove('hidden'); gameRunning=false; };

    canvas.width=CW; canvas.height=CH;
    initAudio(); updateHomescreenStats(); updateUIButtons(); homescreenOverlay.classList.remove('hidden');
    requestAnimationFrame(function loop(ts){ const dt=Math.min((ts-lastTime)/1000,0.1); lastTime=ts; if(gameRunning&&!gameWon&&!isSettingsOpen) update(dt); render(); requestAnimationFrame(loop); });
})();
</script>
</body>
