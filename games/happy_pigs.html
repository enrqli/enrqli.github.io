<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catapult Siege – Fully Fixed</title>
    <style>
        :root { --bg: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent; touch-action: none;
        }
        .game-container {
            position: relative; border-radius: 16px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 3px #3d2b1f, 0 0 0 8px #1a1a2e, 0 0 0 11px #5c3d2e;
        }
        canvas { display: block; border-radius: 12px; cursor: crosshair; }
        .ui-overlay {
            position: absolute; top: 16px; left: 0; right: 0; display: flex;
            justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 10;
        }
        .ui-badge {
            background: rgba(0,0,0,0.65); color: #fff; padding: 8px 16px;
            border-radius: 20px; font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
            backdrop-filter: blur(8px); border: 2px solid rgba(255,255,255,0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .ui-badge.rocks { background: rgba(80,40,20,0.75); border-color: rgba(200,150,100,0.4); }
        .ui-badge.score { background: rgba(20,40,80,0.75); border-color: rgba(150,180,220,0.4); }
        .ui-badge.level { background: rgba(60,20,60,0.75); border-color: rgba(200,150,200,0.4); }
        .restart-btn, .start-bonus-btn {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            padding: 14px 36px; font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, #f7971e, #ff6a00); color: #fff;
            border: none; border-radius: 30px; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(255,106,0,0.5); z-index: 20; display: none;
            transition: all 0.3s ease; text-transform: uppercase;
        }
        .restart-btn:hover, .start-bonus-btn:hover { transform: translateX(-50%) scale(1.06); }
        .restart-btn.visible, .start-bonus-btn.visible { display: block; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes popIn { 0% { transform: translateX(-50%) scale(0.3); opacity: 0; } }
        .instruction {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600;
            pointer-events: none; z-index: 5; text-align: center;
            letter-spacing: 0.5px; text-shadow: 0 1px 3px rgba(0,0,0,0.7);
            transition: opacity 0.5s;
        }
        .level-select {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            z-index: 25; display: flex; gap: 8px; align-items: center;
        }
        .level-select input {
            width: 60px; padding: 5px 8px; border-radius: 8px; border: 2px solid #f7971e;
            background: rgba(0,0,0,0.8); color: #fff; font-size: 14px; text-align: center;
        }
        .level-select button {
            padding: 6px 14px; border-radius: 8px; background: #f7971e; color: #fff;
            border: none; font-weight: 700; cursor: pointer; font-size: 14px;
        }
        .bonus-timer {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            color: #ffdd57; font-size: 30px; font-weight: 700;
            text-shadow: 0 0 10px rgba(0,0,0,0.7); z-index: 30;
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-overlay">
            <div class="ui-badge rocks" id="rocksBadge">🐷 Pigs: 6</div>
            <div class="ui-badge level" id="levelBadge">🏚️ Level 1</div>
            <div class="ui-badge score" id="scoreBadge">⭐ Score: 0</div>
        </div>
        <button class="restart-btn" id="restartBtn">🔄 Play Again</button>
        <button class="start-bonus-btn" id="startBonusBtn">🎯 START BONUS</button>
        <div class="instruction" id="instruction">Drag pig to aim • Tap to split triple pig • Click icons to choose pig</div>
        <div class="level-select">
            <input type="number" id="levelInput" min="1" value="1" placeholder="Level">
            <button id="goLevelBtn">Go</button>
        </div>
        <div class="bonus-timer" id="bonusTimer">20</div>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const restartBtn = document.getElementById('restartBtn');
            const startBonusBtn = document.getElementById('startBonusBtn');
            const rocksBadge = document.getElementById('rocksBadge');
            const scoreBadge = document.getElementById('scoreBadge');
            const levelBadge = document.getElementById('levelBadge');
            const instructionEl = document.getElementById('instruction');
            const levelInput = document.getElementById('levelInput');
            const goLevelBtn = document.getElementById('goLevelBtn');
            const bonusTimerEl = document.getElementById('bonusTimer');

            let audioCtx = null;
            function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            function playSound(type) {
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                switch(type) {
                    case 'launch': osc.type='sine'; osc.frequency.setValueAtTime(200,now); osc.frequency.exponentialRampToValueAtTime(400,now+0.2); gain.gain.setValueAtTime(0.3,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.3); osc.start(now); osc.stop(now+0.3); break;
                    case 'split': osc.type='sine'; osc.frequency.setValueAtTime(400,now); osc.frequency.exponentialRampToValueAtTime(600,now+0.2); gain.gain.setValueAtTime(0.3,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.3); osc.start(now); osc.stop(now+0.3); break;
                    case 'steel_launch': osc.type='sawtooth'; osc.frequency.setValueAtTime(80,now); osc.frequency.exponentialRampToValueAtTime(40,now+0.2); gain.gain.setValueAtTime(0.4,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.4); osc.start(now); osc.stop(now+0.4); break;
                    case 'hit': osc.type='square'; osc.frequency.setValueAtTime(80,now); osc.frequency.exponentialRampToValueAtTime(40,now+0.15); gain.gain.setValueAtTime(0.2,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.2); osc.start(now); osc.stop(now+0.2); break;
                    case 'destroy': osc.type='sawtooth'; osc.frequency.setValueAtTime(300,now); osc.frequency.exponentialRampToValueAtTime(50,now+0.3); gain.gain.setValueAtTime(0.25,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.4); osc.start(now); osc.stop(now+0.4); break;
                    case 'explosion': osc.type='sawtooth'; osc.frequency.setValueAtTime(150,now); osc.frequency.exponentialRampToValueAtTime(20,now+0.5); gain.gain.setValueAtTime(0.4,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.6); osc.start(now); osc.stop(now+0.6); break;
                    case 'big_pig': osc.type='sine'; osc.frequency.setValueAtTime(100,now); osc.frequency.exponentialRampToValueAtTime(30,now+0.6); gain.gain.setValueAtTime(0.5,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.7); osc.start(now); osc.stop(now+0.7); break;
                    case 'death': osc.type='triangle'; osc.frequency.setValueAtTime(500,now); osc.frequency.exponentialRampToValueAtTime(100,now+0.4); gain.gain.setValueAtTime(0.2,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.5); osc.start(now); osc.stop(now+0.5); break;
                    case 'win': osc.type='sine'; osc.frequency.setValueAtTime(523,now); osc.frequency.setValueAtTime(659,now+0.15); osc.frequency.setValueAtTime(784,now+0.3); gain.gain.setValueAtTime(0.3,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.6); osc.start(now); osc.stop(now+0.6); break;
                    case 'lose': osc.type='sine'; osc.frequency.setValueAtTime(400,now); osc.frequency.exponentialRampToValueAtTime(100,now+0.5); gain.gain.setValueAtTime(0.2,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.6); osc.start(now); osc.stop(now+0.6); break;
                    case 'air_strike': osc.type='sawtooth'; osc.frequency.setValueAtTime(120,now); osc.frequency.exponentialRampToValueAtTime(240,now+0.3); gain.gain.setValueAtTime(0.3,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.5); osc.start(now); osc.stop(now+0.5); break;
                    case 'drop_bomb': osc.type='sine'; osc.frequency.setValueAtTime(300,now); osc.frequency.exponentialRampToValueAtTime(50,now+0.2); gain.gain.setValueAtTime(0.4,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.3); osc.start(now); osc.stop(now+0.3); break;
                }
            }

            const WIDTH = 920, HEIGHT = 520;
            canvas.width = WIDTH; canvas.height = HEIGHT;
            function resizeCanvas() {
                const maxW = Math.min(window.innerWidth-20, 920), maxH = Math.min(window.innerHeight-20, 520);
                const scale = Math.min(maxW/WIDTH, maxH/HEIGHT);
                canvas.style.width = (WIDTH*scale)+'px'; canvas.style.height = (HEIGHT*scale)+'px';
            }
            resizeCanvas(); window.addEventListener('resize', resizeCanvas);

            const GRAVITY = 0.25, LAUNCH_POWER = 0.16, MAX_DRAG = 100;
            const GROUND_Y = 435, CATAPULT_X = 135, CATAPULT_Y = 280, ROCK_RADIUS = 14;
            const BIG_PIG_RADIUS = 25;
            const TRIPLE_SPREAD = 0.12;
            const BOUNCE_DAMPING = 0.35, GROUND_DAMPING = 0.3, FRICTION = 0.92;
            const MIN_SPEED_TO_END = 0.6, MAX_ROCKS = 6, WORLD_WIDTH = 1280, MAX_TRAJECTORY_LENGTH = 460;
            const BOMB_BLAST_RADIUS = 100, BOMB_BLOCK_DAMAGE = 10;
            const STEEL_SPEED_MULTIPLIER = 1.6;
            const AIR_STRIKE_SPEED = 2.5;
            const BONUS_DURATION = 20;

            let gameState = 'aiming', rocksRemaining = MAX_ROCKS, score = 0, level = 1;
            let activeRocks = [], dragPos = null, isDragging = false;
            let blocks = [], enemies = [], particles = [];
            let screenShake = 0, settleTimer = 0;
            let trajectoryPoints = [];
            let castleSeed = 0, lastTrajectory = null;
            let cameraX = 0, targetCameraX = 0;
            let isPanning = false, panLastScreenX = 0;
            let ammoQueue = [];
            let selectedOverride = null;
            let savedSeed = 0, savedAmmoQueue = [];
            let stableCounter = 0;
            let pigSelectorVisible = false;

            let bonusTimeLeft = 0;
            let bonusSpawnCounter = 0;
            let bonusStarted = false;

            const MATERIALS = {
                wood: { hp: 2, color: '#8B5A2B' }, stone: { hp: 3, color: '#808080' }, ice: { hp: 1, color: '#ADD8E6' }
            };

            function createBlock(x,y,w,h,material) {
                const mat = MATERIALS[material] || MATERIALS.wood;
                return {x,y,w,h,hp:mat.hp,maxHp:mat.hp,color:mat.color,material, destroyed:false,falling:false,vy:0,vx:0, angle:0,angularVelocity:0,tilting:false, pivotX:null, pivotY:null, pivotSide:null};
            }
            function createEnemy(x,y,type) {
                let radius = 13;
                if (type === 'big_red') radius = 16;
                else if (type === 'small_blue') radius = 9;
                return {x,y,radius,alive:true,vy:0,vx:0,type:type};
            }
            function createParticle(x,y,vx,vy,color,size,life) {
                return {x,y,vx,vy,color,size,life,maxLife:life,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.4};
            }

            function seededRandom(seed) { let s=seed; return ()=>{ s=(s*16807)%2147483647; return (s-1)/2147483646; }; }

            function clampEnemyX(enemy) {
                if (enemy.x < enemy.radius) enemy.x = enemy.radius;
                if (enemy.x > WORLD_WIDTH - enemy.radius) enemy.x = WORLD_WIDTH - enemy.radius;
            }
            function placeEnemyOnBlock(enemy, blocks) {
                let bestBlock = null;
                for (const block of blocks) {
                    if (block.destroyed) continue;
                    if (enemy.x + enemy.radius > block.x && enemy.x - enemy.radius < block.x + block.w) {
                        if (block.y <= enemy.y) {
                            if (!bestBlock || block.y > bestBlock.y) bestBlock = block;
                        }
                    }
                }
                if (bestBlock) enemy.y = bestBlock.y - enemy.radius;
                else {
                    const platW = 40, platH = 15, platX = enemy.x - platW/2, platY = GROUND_Y - platH;
                    blocks.push(createBlock(platX, platY, platW, platH, 'wood'));
                    enemy.y = platY - enemy.radius;
                }
            }

            const enemyTypes = ['big_red','round_black','triangle_yellow','small_blue'];
            function addRandomEnemy(x, y) {
                x = Math.max(10, Math.min(WORLD_WIDTH - 10, x));
                const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
                const enemy = createEnemy(x, y, type);
                enemies.push(enemy);
                clampEnemyX(enemy);
                placeEnemyOnBlock(enemy, blocks);
            }
            function addSmallBluePack(x, y) {
                for (let i = 0; i < 3; i++) {
                    const ex = Math.max(10, Math.min(WORLD_WIDTH - 10, x + (i - 1) * 20));
                    const enemy = createEnemy(ex, y, 'small_blue');
                    enemies.push(enemy);
                    clampEnemyX(enemy);
                    placeEnemyOnBlock(enemy, blocks);
                }
            }
            function addBlockSafe(x, y, w, h, material) {
                if (x + w > WORLD_WIDTH) { w = WORLD_WIDTH - x; if (w <= 0) return null; }
                const block = createBlock(x, y, w, h, material);
                blocks.push(block);
                return block;
            }

            // ===== STRUCTURE GENERATION (unchanged) =====
            function generateBigSpreadStructure(startX, levelScale) {
                const rng = seededRandom(castleSeed);
                const baseX = startX;
                let width = 500 * levelScale;
                const maxWidth = WORLD_WIDTH - baseX - 20;
                if (width > maxWidth) width = maxWidth;
                const plankH = 15, pillarW = 22, gap = 2;
                const addBlock = (x,y,w,h,m) => addBlockSafe(x,y,w,h,m);

                for (let x = baseX; x < baseX + width; x += pillarW + gap) {
                    addBlock(x, GROUND_Y - plankH, pillarW, plankH, 'stone');
                }
                for (let i = 0; i < 8; i++) {
                    const px = baseX + i * 60 + rng() * 20;
                    if (px > WORLD_WIDTH - pillarW) break;
                    const height = (80 + rng() * 100) * levelScale;
                    addBlock(px, GROUND_Y - plankH - height, pillarW, height, 'wood');
                    addRandomEnemy(px + pillarW/2, GROUND_Y - plankH - height);
                }
                for (let i = 0; i < 12; i++) {
                    const platX = baseX + rng() * width;
                    if (platX > WORLD_WIDTH - 30) continue;
                    const platY = GROUND_Y - plankH - (40 + rng() * 120) * levelScale;
                    const platW = (60 + rng() * 80) * levelScale;
                    addBlock(platX, platY, platW, plankH, 'ice');
                    addRandomEnemy(platX + platW/2, platY);
                }
                addSmallBluePack(baseX + 100, GROUND_Y - plankH - 80);
                addSmallBluePack(baseX + 300, GROUND_Y - plankH - 120);
                for (let i = 0; i < 6; i++) {
                    const ex = baseX + rng() * width;
                    addRandomEnemy(ex, GROUND_Y - 16);
                }
                while (enemies.length < 18) addRandomEnemy(baseX + rng() * width, GROUND_Y - 30 - rng() * 100);
                if (enemies.length > 25) enemies.splice(25);
            }

            function generateLevel30Fortress() {
                blocks = []; enemies = [];
                const addBlock = (x, y, w, h, material) => addBlockSafe(x, y, w, h, material);
                const fortressX = 640;

                addBlock(fortressX, GROUND_Y - 20, 20, 20, 'stone');
                addBlock(fortressX + 30, GROUND_Y - 20, 20, 20, 'stone');
                addBlock(fortressX + 60, GROUND_Y - 20, 20, 20, 'stone');
                addBlock(fortressX + 90, GROUND_Y - 20, 20, 20, 'stone');
                addBlock(fortressX - 30, GROUND_Y - 15, 180, 15, 'wood');
                addBlock(fortressX - 10, GROUND_Y - 80, 140, 15, 'ice');
                addBlock(fortressX + 20, GROUND_Y - 140, 100, 15, 'ice');
                addBlock(fortressX, GROUND_Y - 140, 22, 140, 'wood');
                addBlock(fortressX + 98, GROUND_Y - 140, 22, 140, 'wood');
                addBlock(fortressX + 50, GROUND_Y - 80, 22, 80, 'stone');
                addBlock(fortressX - 20, GROUND_Y - 160, 160, 15, 'wood');
                addBlock(fortressX + 60, GROUND_Y - 200, 22, 60, 'stone');
                addBlock(fortressX + 50, GROUND_Y - 215, 42, 15, 'ice');
                addBlock(fortressX + 65, GROUND_Y - 235, 22, 20, 'wood');

                const addEnemy = (x, y, type) => {
                    const enemy = createEnemy(x, y, type);
                    enemies.push(enemy);
                    clampEnemyX(enemy);
                    placeEnemyOnBlock(enemy, blocks);
                };
                addEnemy(fortressX + 30, GROUND_Y - 90, 'big_red');
                addEnemy(fortressX + 80, GROUND_Y - 90, 'triangle_yellow');
                addEnemy(fortressX + 55, GROUND_Y - 150, 'small_blue');
                addEnemy(fortressX + 110, GROUND_Y - 150, 'round_black');
                addEnemy(fortressX + 70, GROUND_Y - 210, 'big_red');
                addEnemy(fortressX + 90, GROUND_Y - 240, 'triangle_yellow');
                addEnemy(fortressX + 40, GROUND_Y - 16, 'small_blue');
                addEnemy(fortressX + 120, GROUND_Y - 16, 'big_red');
            }

            function generateAngryBirdsStructure() {
                blocks = []; enemies = [];
                const rng = seededRandom(castleSeed);
                const startX = 640 + Math.floor(rng() * 40);
                const plankH = 15, pillarW = 22, gap = 2;
                const addBlock = (x, y, w, h, material) => addBlockSafe(x, y, w, h, material);
                const levelScale = 1 + level * 0.04;
                const moderateScale = (level > 10 && level !== 15 && level !== 19 && level % 10 !== 0) ? 1.25 : 1;

                if (level === 2008) {
                    const blockSize = 22;
                    const startBlockX = 300;
                    const endBlockX = WORLD_WIDTH - 20;
                    const startBlockY = GROUND_Y - 400;
                    for (let y = startBlockY; y < GROUND_Y; y += blockSize) {
                        for (let x = startBlockX; x < endBlockX; x += blockSize) {
                            const material = (Math.floor(y / blockSize) % 2 === 0) ? 'stone' : 'wood';
                            addBlockSafe(x, y, blockSize - 2, blockSize - 2, material);
                        }
                    }
                    for (let i = 0; i < 5; i++) {
                        addRandomEnemy(startBlockX + 50 + i * 100, startBlockY - 20);
                    }
                    return;
                }

                if (level === 5) {
                    const wallX = startX + 40;
                    const wallH = 160 * levelScale;
                    for (let y = GROUND_Y - wallH; y < GROUND_Y; y += plankH + gap) {
                        addBlock(wallX, y, pillarW, plankH, 'stone');
                        addBlock(wallX + pillarW + gap, y, pillarW, plankH, 'stone');
                    }
                    const platX = wallX + 80;
                    addBlock(platX, GROUND_Y - 40, 80, plankH, 'wood');
                    for (let i = 0; i < 8; i++) {
                        const bomb = createEnemy(platX + 10 + rng() * 60, GROUND_Y - 40 - 14, 'round_black');
                        enemies.push(bomb);
                        clampEnemyX(bomb);
                        placeEnemyOnBlock(bomb, blocks);
                    }
                    while (enemies.length < 10) {
                        const ex = startX + rng() * 150;
                        const bomb = createEnemy(ex, GROUND_Y - 30 - rng() * 80, 'round_black');
                        enemies.push(bomb);
                        clampEnemyX(bomb);
                        placeEnemyOnBlock(bomb, blocks);
                    }
                    return;
                }

                if (level === 30) {
                    generateLevel30Fortress();
                    return;
                }

                if (level === 15 || level === 19 || (level >= 20 && level % 10 === 0)) {
                    generateBigSpreadStructure(startX, levelScale);
                    return;
                }

                if (level % 10 === 0 && level < 20) {
                    const fortressStartX = startX;
                    const wallH = 200 * levelScale;
                    const wallX = fortressStartX;
                    for (let y = GROUND_Y - wallH; y < GROUND_Y; y += plankH + gap) {
                        addBlock(wallX, y, pillarW, plankH, 'stone');
                        addBlock(wallX + pillarW + gap, y, pillarW, plankH, 'stone');
                        addBlock(wallX + pillarW*2 + gap*2, y, pillarW, plankH, 'stone');
                    }
                    const innerWallX = wallX + pillarW*3 + gap*3 + 60;
                    for (let y = GROUND_Y - wallH + 40; y < GROUND_Y; y += plankH + gap) {
                        addBlock(innerWallX, y, pillarW, plankH, 'stone');
                        addBlock(innerWallX + pillarW + gap, y, pillarW, plankH, 'stone');
                    }
                    const towerH = 140 * levelScale;
                    const leftTowerX = wallX - 30;
                    const rightTowerX = innerWallX + pillarW*2 + 30;
                    addBlock(leftTowerX, GROUND_Y - towerH, pillarW, towerH, 'stone');
                    addBlock(rightTowerX, GROUND_Y - towerH, pillarW, towerH, 'stone');
                    addBlock(leftTowerX, GROUND_Y - towerH - plankH, wallX - leftTowerX + pillarW, plankH, 'wood');
                    addBlock(innerWallX, GROUND_Y - towerH - plankH, rightTowerX - innerWallX + pillarW, plankH, 'ice');
                    addBlock(wallX, GROUND_Y - wallH - plankH, pillarW*3 + gap*2, plankH, 'ice');
                    for (let i = 0; i < 12; i++) {
                        const ex = fortressStartX + rng() * 180;
                        const ey = GROUND_Y - 30 - rng() * 150;
                        addRandomEnemy(ex, Math.max(GROUND_Y-200, ey));
                    }
                    const backPlatX = fortressStartX + 280;
                    const backPlatY = GROUND_Y - 60;
                    addBlock(backPlatX, backPlatY, 80, plankH, 'wood');
                    addRandomEnemy(backPlatX + 20, backPlatY);
                    addRandomEnemy(backPlatX + 60, backPlatY);
                    if (level > 10) {
                        for (let i = 0; i < 4; i++) {
                            const bx = fortressStartX + rng() * 220;
                            const by = GROUND_Y - 50 - rng() * 100;
                            const bomb = createEnemy(bx, by, 'round_black');
                            enemies.push(bomb);
                            clampEnemyX(bomb);
                            placeEnemyOnBlock(bomb, blocks);
                        }
                    }
                    while (enemies.length < 8) addRandomEnemy(fortressStartX + rng() * 180, GROUND_Y - 30 - rng() * 80);
                    return;
                }

                if (level > 10) {
                    const bombCount = Math.floor(rng() * 6);
                    for (let b = 0; b < bombCount; b++) {
                        const bx = startX + rng() * 180, by = GROUND_Y - 30 - rng() * 80;
                        const bomb = createEnemy(bx, by, 'round_black');
                        enemies.push(bomb);
                        clampEnemyX(bomb);
                        placeEnemyOnBlock(bomb, blocks);
                    }
                } else if (level > 5) {
                    const bombCount = Math.floor(rng() * 4);
                    for (let b = 0; b < bombCount; b++) {
                        const bx = startX + rng() * 180, by = GROUND_Y - 30 - rng() * 80;
                        const bomb = createEnemy(bx, by, 'round_black');
                        enemies.push(bomb);
                        clampEnemyX(bomb);
                        placeEnemyOnBlock(bomb, blocks);
                    }
                }

                let template;
                if (level <= 4) {
                    template = level - 1;
                } else {
                    template = Math.floor(rng() * 6);
                }

                let scale = (level === 3) ? 0.85 : ((level > 10 && level !== 15 && level !== 19 && level % 10 !== 0) ? moderateScale : levelScale);

                switch(template) {
                    case 0: {
                        const towerH0 = (120 + rng()*60) * scale;
                        const topY0 = GROUND_Y - towerH0;
                        addBlock(startX, topY0, pillarW, towerH0, 'wood');
                        addBlock(startX+80, topY0, pillarW, towerH0, 'stone');
                        const platforms = 3 + Math.floor(rng()*(3 + Math.floor(level/5)));
                        for(let i=0; i<platforms; i++) {
                            const py = GROUND_Y - (towerH0/(platforms+1))*(i+1);
                            addBlock(startX, py-plankH, 80+pillarW, plankH, 'ice');
                            addRandomEnemy(startX + 40 + pillarW/2, py);
                        }
                        addBlock(startX, topY0-plankH, 80+pillarW, plankH, 'wood');
                        addRandomEnemy(startX + 40 + pillarW/2, topY0);
                        addRandomEnemy(startX + 20, GROUND_Y-16);
                        addRandomEnemy(startX + 80 + pillarW - 20, GROUND_Y-16);
                        break;
                    }
                    case 1: {
                        const boxW = (120 + rng()*60) * scale;
                        const boxH = (80 + rng()*40) * scale;
                        addBlock(startX, GROUND_Y-plankH, boxW, plankH, 'stone');
                        addBlock(startX, GROUND_Y-boxH, pillarW, boxH, 'wood');
                        addBlock(startX+boxW-pillarW, GROUND_Y-boxH, pillarW, boxH, 'wood');
                        addBlock(startX, GROUND_Y-boxH-plankH, boxW, plankH, 'ice');
                        addBlock(startX+boxW*0.33, GROUND_Y-boxH, pillarW, boxH-plankH, 'stone');
                        addBlock(startX+boxW*0.66, GROUND_Y-boxH, pillarW, boxH-plankH, 'stone');
                        addRandomEnemy(startX+boxW/2, GROUND_Y-boxH+boxH/2);
                        addRandomEnemy(startX+boxW*0.33+pillarW/2, GROUND_Y-boxH+20);
                        addRandomEnemy(startX+boxW*0.66+pillarW/2, GROUND_Y-boxH+40);
                        addRandomEnemy(startX+boxW/2, GROUND_Y-boxH);
                        break;
                    }
                    case 2: {
                        const blockSize = 28 * scale;
                        const pyramidHeight = (level === 3) ? 3 : (4 + Math.floor(rng()*(3 + level/3)));
                        const topY = GROUND_Y - pyramidHeight * (plankH + gap);
                        const topBlockX = startX + 50;
                        addBlock(topBlockX, topY, blockSize, plankH, 'stone');
                        addRandomEnemy(topBlockX + blockSize/2, topY);
                        let prevRowX = topBlockX, prevRowW = blockSize, currentY = topY + plankH + gap;
                        for (let row = 1; row < pyramidHeight; row++) {
                            const leftBlockX = prevRowX - blockSize, rightBlockX = prevRowX + prevRowW;
                            for (let bx = leftBlockX; bx <= rightBlockX; bx += blockSize) {
                                addBlock(bx, currentY, blockSize - gap, plankH, 'wood');
                            }
                            addRandomEnemy(leftBlockX + (rightBlockX - leftBlockX + blockSize)/2, currentY);
                            prevRowX = leftBlockX; prevRowW = (rightBlockX - leftBlockX + blockSize); currentY += plankH + gap;
                        }
                        addRandomEnemy(startX + 20, GROUND_Y-16);
                        addRandomEnemy(startX + 80, GROUND_Y-16);
                        break;
                    }
                    case 3: {
                        const pillarH = (80 + rng()*40) * scale;
                        const leftX = startX, rightX = leftX + (160 + rng()*80) * scale;
                        addBlock(leftX, GROUND_Y-pillarH, pillarW, pillarH, 'stone');
                        addBlock(rightX, GROUND_Y-pillarH, pillarW, pillarH, 'stone');
                        const midX = leftX + (rightX - leftX)/2;
                        addBlock(midX, GROUND_Y-pillarH+20, pillarW, pillarH-20, 'wood');
                        addBlock(leftX, GROUND_Y-pillarH-plankH, rightX-leftX+pillarW, plankH, 'wood');
                        addRandomEnemy(leftX+pillarW/2, GROUND_Y-pillarH);
                        addRandomEnemy(rightX+pillarW/2, GROUND_Y-pillarH);
                        addRandomEnemy(midX+pillarW/2, GROUND_Y-pillarH+20);
                        addRandomEnemy(leftX+(rightX-leftX)/2+pillarW/2, GROUND_Y-pillarH);
                        addSmallBluePack(leftX+30, GROUND_Y-pillarH-plankH);
                        break;
                    }
                    case 4: {
                        const towerW = pillarW*2, leftTX = startX, rightTX = startX + (120 + rng()*60) * scale;
                        const towerH = (100 + rng()*50) * scale;
                        addBlock(leftTX, GROUND_Y-towerH, pillarW, towerH, 'stone');
                        addBlock(leftTX+towerW-pillarW, GROUND_Y-towerH, pillarW, towerH, 'wood');
                        addBlock(rightTX, GROUND_Y-towerH, pillarW, towerH, 'stone');
                        addBlock(rightTX+towerW-pillarW, GROUND_Y-towerH, pillarW, towerH, 'wood');
                        addBlock(leftTX, GROUND_Y-towerH-plankH, (rightTX-leftTX)+towerW, plankH, 'ice');
                        addRandomEnemy(leftTX+towerW/2, GROUND_Y-towerH);
                        addRandomEnemy(rightTX+towerW/2, GROUND_Y-towerH);
                        addRandomEnemy(leftTX+towerW/2, GROUND_Y-towerH);
                        addRandomEnemy((leftTX+rightTX+towerW)/2, GROUND_Y-16);
                        break;
                    }
                    case 5: {
                        const baseW = (140 + rng()*60) * scale;
                        addBlock(startX, GROUND_Y-plankH, baseW, plankH, 'stone');
                        addBlock(startX, GROUND_Y-plankH-50, pillarW, 50, 'wood');
                        addBlock(startX+baseW-pillarW, GROUND_Y-plankH-50, pillarW, 50, 'wood');
                        addBlock(startX, GROUND_Y-plankH-50-plankH, baseW, plankH, 'ice');
                        const smallTowerH = 60;
                        addBlock(startX, GROUND_Y-plankH-50-smallTowerH, pillarW, smallTowerH, 'stone');
                        addBlock(startX, GROUND_Y-plankH-50-smallTowerH-plankH, pillarW*2, plankH, 'ice');
                        addRandomEnemy(startX + pillarW, GROUND_Y-plankH-50-smallTowerH);
                        addRandomEnemy(startX + baseW/2, GROUND_Y-plankH-25);
                        addRandomEnemy(startX + baseW*0.3, GROUND_Y-plankH-35);
                        addRandomEnemy(startX + baseW*0.7, GROUND_Y-plankH-35);
                        addSmallBluePack(startX + baseW/2, GROUND_Y-plankH-45);
                        break;
                    }
                }
                while (enemies.length < 6) addRandomEnemy(startX + rng() * 180, GROUND_Y - 30 - rng() * 80);
                if (enemies.length > 18) enemies.splice(18);
            }

            function generateAmmoQueue() {
                ammoQueue = [];
                if (level === 30) {
                    ammoQueue.push('air_strike');
                    return;
                }
                if (gameState === 'bonus') {
                    for (let i = 0; i < 20; i++) {
                        const r = Math.random();
                        if (r < 0.25) ammoQueue.push('bomb_pig');
                        else if (r < 0.5) ammoQueue.push('big_pig');
                        else if (r < 0.75) ammoQueue.push('steel_pig');
                        else ammoQueue.push('air_strike');
                    }
                    return;
                }
                if (level % 10 === 0 && level !== 20 && level !== 30) {
                    for (let i = 0; i < rocksRemaining; i++) {
                        ammoQueue.push('big_pig');
                    }
                    return;
                }
                for (let i = 0; i < rocksRemaining; i++) {
                    if (level === 5) { ammoQueue.push('bomb_pig'); }
                    else if (level === 15) { ammoQueue.push('triple_pig'); }
                    else if (level === 20 || level === 2008) { ammoQueue.push('steel_pig'); }
                    else if (level >= 30 && Math.random() < 0.15) { ammoQueue.push('air_strike'); }
                    else if (level % 10 === 0 && level > 20) {
                        const r = Math.random();
                        if (r < 0.15) ammoQueue.push('steel_pig');
                        else if (r < 0.35) ammoQueue.push('big_pig');
                        else if (r < 0.65) ammoQueue.push('bomb_pig');
                        else if (r < 0.80) ammoQueue.push('triple_pig');
                        else ammoQueue.push('pig');
                    } else if (level > 20) {
                        const r = Math.random();
                        if (r < 0.10) ammoQueue.push('steel_pig');
                        else if (r < 0.30) ammoQueue.push('big_pig');
                        else if (r < 0.60) ammoQueue.push('bomb_pig');
                        else if (r < 0.75 && level >= 15) ammoQueue.push('triple_pig');
                        else ammoQueue.push('pig');
                    } else if (level >= 15 && Math.random() < 0.25) { ammoQueue.push('triple_pig'); }
                    else if (level > 10) {
                        const r = Math.random();
                        if (r < 0.20) ammoQueue.push('big_pig');
                        else if (r < 0.65) ammoQueue.push('bomb_pig');
                        else ammoQueue.push('pig');
                    } else if (level > 5) { ammoQueue.push(Math.random() < 0.4 ? 'bomb_pig' : 'pig'); }
                    else { ammoQueue.push('pig'); }
                }
            }

            // ===== INITIALIZATION =====
            function initGame(resetScore = true) {
                if (resetScore) score = 0;
                gameState = 'aiming';
                activeRocks = []; dragPos = null; isDragging = false;
                particles = []; screenShake = 0; settleTimer = 0; trajectoryPoints = [];
                lastTrajectory = null; cameraX = 0; targetCameraX = 0;
                castleSeed = level * 7777;
                savedSeed = castleSeed;
                generateAngryBirdsStructure();
                rocksRemaining = (level === 30) ? 1 : MAX_ROCKS;
                generateAmmoQueue();
                savedAmmoQueue = [...ammoQueue];
                selectedOverride = null;
                stableCounter = 30;
                updateUI();
                levelInput.value = level;
                restartBtn.classList.remove('visible'); startBonusBtn.classList.remove('visible');
                instructionEl.style.opacity = '1';
                instructionEl.textContent = "Drag pig to aim • Tap to split triple pig • Click to drop bomb (air strike)";
                bonusTimerEl.style.display = 'none';
            }

            function initBonus() {
                gameState = 'bonus';
                blocks = []; enemies = []; activeRocks = [];
                particles = []; trajectoryPoints = [];
                rocksRemaining = 999;
                generateAmmoQueue();
                savedAmmoQueue = [...ammoQueue];
                bonusTimeLeft = BONUS_DURATION;
                bonusSpawnCounter = 0;
                bonusStarted = false;
                cameraX = 0; targetCameraX = 0;
                stableCounter = 0;
                selectedOverride = null;
                updateUI();
                instructionEl.textContent = "BONUS ROUND – Click START BONUS to begin!";
                restartBtn.classList.remove('visible');
                startBonusBtn.classList.add('visible');
                bonusTimerEl.style.display = 'block';
                bonusTimerEl.textContent = BONUS_DURATION;
            }

            function startBonusNow() {
                bonusStarted = true;
                startBonusBtn.classList.remove('visible');
                instructionEl.textContent = "BONUS ROUND – DESTROY EVERYTHING! 20 SECONDS!";
                updateUI();
            }

            function endBonus() {
                gameState = 'aiming';
                bonusTimerEl.style.display = 'none';
                startBonusBtn.classList.remove('visible');
                level++;
                initGame(false);
            }

            function retryLevel() {
                if (gameState === 'bonus') { initBonus(); return; }
                score = 0;
                levelInput.value = level;
                initGame(true);
            }

            function nextLevel() {
                if (gameState === 'bonus') { endBonus(); return; }
                if (Math.random() < 0.2) { initBonus(); return; }
                level++;
                initGame(false);
            }

            function updateUI() {
                rocksBadge.textContent = '🐷 Pigs: ' + (gameState === 'bonus' ? '∞' : rocksRemaining);
                scoreBadge.textContent = '⭐ Score: ' + score;
                levelBadge.textContent = gameState === 'bonus' ? '🎁 BONUS' : '🏚️ Level ' + level;
            }

            goLevelBtn.addEventListener('click', () => {
                const newLevel = parseInt(levelInput.value);
                if (!isNaN(newLevel) && newLevel >= 1) { level = newLevel; initGame(true); }
            });
            levelInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const newLevel = parseInt(levelInput.value);
                    if (!isNaN(newLevel) && newLevel >= 1) { level = newLevel; initGame(true); }
                }
            });

            startBonusBtn.addEventListener('click', () => {
                if (gameState === 'bonus' && !bonusStarted) {
                    startBonusNow();
                }
            });

            // ===== INPUT HANDLING =====
            function getCanvasScale() { return WIDTH / canvas.getBoundingClientRect().width; }
            function screenToWorld(screenX, screenY) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = WIDTH/rect.width, scaleY = HEIGHT/rect.height;
                return { x: (screenX - rect.left) * scaleX + cameraX, y: (screenY - rect.top) * scaleY };
            }

            const allPigTypes = ['pig', 'bomb_pig', 'triple_pig', 'big_pig', 'steel_pig', 'air_strike', 'bonus'];
            const pigSelectors = allPigTypes.map((type, i) => {
                return { type, x: 20, y: 20 + i * 55, w: 50, h: 50 };
            });

            function drawPigSelector() {
                if (!pigSelectorVisible || gameState !== 'aiming') return;
                for (const sel of pigSelectors) {
                    const isSelected = (selectedOverride === sel.type);
                    ctx.fillStyle = isSelected ? 'rgba(255,255,100,0.5)' : 'rgba(0,0,0,0.5)';
                    ctx.fillRect(sel.x, sel.y, sel.w, sel.h);
                    ctx.strokeStyle = isSelected ? '#ff0' : '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(sel.x, sel.y, sel.w, sel.h);
                    ctx.save();
                    ctx.translate(sel.x + sel.w/2, sel.y + sel.h/2);
                    ctx.scale(0.5, 0.5);
                    if (sel.type === 'big_pig') {
                        ctx.fillStyle = '#449944'; ctx.beginPath(); ctx.arc(0, 0, BIG_PIG_RADIUS*0.6, 0, Math.PI*2); ctx.fill();
                    } else if (sel.type === 'bomb_pig') {
                        ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(0, 0, ROCK_RADIUS*0.9, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(3, -10); ctx.stroke();
                    } else if (sel.type === 'triple_pig') {
                        const spacing = 8;
                        ctx.fillStyle = '#66bb66';
                        ctx.beginPath(); ctx.arc(-spacing, spacing, 5, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(spacing, spacing, 5, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(0, -spacing, 5, 0, Math.PI*2); ctx.fill();
                    } else if (sel.type === 'steel_pig') {
                        ctx.fillStyle = '#a0a0a0'; ctx.beginPath(); ctx.arc(0, 0, ROCK_RADIUS*0.9, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#d0d0d0'; ctx.beginPath(); ctx.arc(0, -3, 4, 0, Math.PI*2); ctx.fill();
                    } else if (sel.type === 'air_strike') {
                        ctx.fillStyle = '#66bb66';
                        ctx.beginPath(); ctx.arc(0, 0, ROCK_RADIUS*0.9, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath(); ctx.moveTo(-ROCK_RADIUS, -3); ctx.lineTo(-ROCK_RADIUS-6, -8); ctx.lineTo(-ROCK_RADIUS, -2); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(ROCK_RADIUS, -3); ctx.lineTo(ROCK_RADIUS+6, -8); ctx.lineTo(ROCK_RADIUS, -2); ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath(); ctx.arc(-3, -2, 2.5, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(3, -2, 2.5, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.beginPath(); ctx.arc(-3, -2, 1.2, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(3, -2, 1.2, 0, Math.PI*2); ctx.fill();
                    } else if (sel.type === 'bonus') {
                        ctx.fillStyle = '#ffaa00';
                        ctx.beginPath(); ctx.arc(0, 0, ROCK_RADIUS*0.9, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('BONUS', 0, 3);
                    } else {
                        ctx.fillStyle = '#66bb66'; ctx.beginPath(); ctx.arc(0, 0, ROCK_RADIUS*0.9, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.restore();
                }
            }

            function handlePigSelectorClick(screenX, screenY) {
                if (!pigSelectorVisible || gameState !== 'aiming') return false;
                for (const sel of pigSelectors) {
                    if (screenX >= sel.x && screenX <= sel.x + sel.w && screenY >= sel.y && screenY <= sel.y + sel.h) {
                        if (sel.type === 'bonus') { initBonus(); return true; }
                        selectedOverride = sel.type;
                        return true;
                    }
                }
                return false;
            }

            function splitTriplePig(parent) {
                if (!parent || !parent.active) return;
                const spread = Math.hypot(parent.vx, parent.vy) * TRIPLE_SPREAD;
                const perpX = -parent.vy; const perpY = parent.vx;
                const len = Math.hypot(perpX, perpY) || 1;
                const normX = perpX / len; const normY = perpY / len;
                const newRocks = [
                    {x: parent.x, y: parent.y, vx: parent.vx + normX * spread, vy: parent.vy + normY * spread, radius: ROCK_RADIUS, active: true, bounces: 0, type:'pig'},
                    {x: parent.x, y: parent.y, vx: parent.vx, vy: parent.vy, radius: ROCK_RADIUS, active: true, bounces: 0, type:'pig'},
                    {x: parent.x, y: parent.y, vx: parent.vx - normX * spread, vy: parent.vy - normY * spread, radius: ROCK_RADIUS, active: true, bounces: 0, type:'pig'}
                ];
                const idx = activeRocks.indexOf(parent);
                if (idx !== -1) activeRocks.splice(idx, 1, ...newRocks);
                playSound('split');
                spawnParticles(parent.x, parent.y, 10, ['#66bb66','#88cc88'], 3, [2,6]);
            }

            function handleMouseDown(e) {
                initAudio();
                const rect = canvas.getBoundingClientRect();
                const screenX = e.clientX - rect.left;
                const screenY = e.clientY - rect.top;

                if (handlePigSelectorClick(screenX, screenY)) return;

                if (gameState === 'bonus' && !bonusStarted) { startBonusNow(); return; }

                if (gameState === 'flying' || gameState === 'bonus_flying') {
                    const airStrike = activeRocks.find(r => r.active && r.type === 'air_strike');
                    if (airStrike) {
                        const bomb = { x: airStrike.x, y: airStrike.y, vx: 0, vy: 2, radius: ROCK_RADIUS, active: true, bounces: 0, type: 'bomb_pig' };
                        activeRocks.push(bomb);
                        playSound('drop_bomb');
                        return;
                    }
                    const tripleParent = activeRocks.find(r => r.active && r.type === 'triple_pig');
                    if (tripleParent) { splitTriplePig(tripleParent); return; }
                }

                if (gameState !== 'aiming' && gameState !== 'bonus') return;
                const worldPos = screenToWorld(e.clientX, e.clientY);
                const dist = Math.hypot(worldPos.x - CATAPULT_X, worldPos.y - CATAPULT_Y);
                if (dist < 55) {
                    isDragging = true; dragPos = {x: worldPos.x, y: worldPos.y}; instructionEl.style.opacity = '0.3';
                } else {
                    isPanning = true; panLastScreenX = e.clientX; canvas.style.cursor = 'grab';
                }
            }

            function handleMouseMove(e) {
                if (isDragging) {
                    const worldPos = screenToWorld(e.clientX, e.clientY);
                    let dx = worldPos.x - CATAPULT_X, dy = worldPos.y - CATAPULT_Y;
                    const dist = Math.hypot(dx, dy);
                    if (dist > MAX_DRAG) { const s = MAX_DRAG/dist; dx *= s; dy *= s; }
                    dragPos = {x: CATAPULT_X + dx, y: CATAPULT_Y + dy};
                    updateTrajectory();
                } else if (isPanning) {
                    const scale = getCanvasScale();
                    const deltaX = (e.clientX - panLastScreenX) * scale;
                    cameraX = Math.max(0, Math.min(WORLD_WIDTH - WIDTH, cameraX - deltaX));
                    targetCameraX = cameraX;
                    panLastScreenX = e.clientX;
                }
            }

            function handleMouseUp(e) {
                if (isDragging) {
                    isDragging = false; instructionEl.style.opacity = '0';
                    const dx = CATAPULT_X - dragPos.x, dy = CATAPULT_Y - dragPos.y;
                    const dragDist = Math.hypot(dx, dy);
                    if (dx < 0) { dragPos = null; trajectoryPoints = []; instructionEl.style.opacity = '1'; return; }
                    if (dragDist < 8) { dragPos = null; trajectoryPoints = []; instructionEl.style.opacity = '1'; return; }
                    if (trajectoryPoints.length > 0) lastTrajectory = trajectoryPoints.map(p => ({x:p.x, y:p.y}));
                    const nx = dx/dragDist, ny = dy/dragDist, speed = dragDist * LAUNCH_POWER;
                    let type = selectedOverride ? selectedOverride : ammoQueue.shift();
                    if (!selectedOverride) {
                        if (gameState !== 'bonus') rocksRemaining--;
                        else {
                            const r = Math.random();
                            if (r < 0.25) ammoQueue.push('bomb_pig');
                            else if (r < 0.5) ammoQueue.push('big_pig');
                            else if (r < 0.75) ammoQueue.push('steel_pig');
                            else ammoQueue.push('air_strike');
                        }
                    } else selectedOverride = null;

                    let radius = ROCK_RADIUS;
                    if (type === 'big_pig') radius = BIG_PIG_RADIUS;
                    let launchSpeed = speed;
                    if (type === 'steel_pig') launchSpeed *= STEEL_SPEED_MULTIPLIER;
                    if (type === 'air_strike') launchSpeed = AIR_STRIKE_SPEED;

                    if (type === 'triple_pig') {
                        activeRocks = [{x:dragPos.x, y:dragPos.y, vx:nx*launchSpeed, vy:ny*launchSpeed, radius:ROCK_RADIUS, active:true, bounces:0, type:'triple_pig'}];
                        playSound('launch');
                    } else if (type === 'air_strike') {
                        activeRocks = [{x:dragPos.x, y:dragPos.y, vx:launchSpeed, vy:0, radius:ROCK_RADIUS, active:true, bounces:0, type:'air_strike'}];
                        playSound('air_strike');
                    } else {
                        activeRocks = [{x:dragPos.x, y:dragPos.y, vx:nx*launchSpeed, vy:ny*launchSpeed, radius:radius, active:true, bounces:0, type:type}];
                        playSound(type === 'big_pig' ? 'big_pig' : (type === 'steel_pig' ? 'steel_launch' : 'launch'));
                    }
                    gameState = (gameState === 'bonus') ? 'bonus_flying' : 'flying';
                    dragPos = null; trajectoryPoints = [];
                    updateUI();
                } else if (isPanning) {
                    isPanning = false; canvas.style.cursor = 'crosshair';
                }
            }

            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('mouseleave', ()=>{ if(isDragging) handleMouseUp({}); if(isPanning) { isPanning = false; canvas.style.cursor = 'crosshair'; } });
            canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); initAudio(); if(e.touches.length === 1) handleMouseDown(e.touches[0]); }, {passive: false});

            function computeTrajectory(startX, startY, vx, vy, applyGravity = true) {
                let tx = startX, ty = startY, tvx = vx, tvy = vy;
                const pts = [];
                for(let i=0; i<100; i++) {
                    tx += tvx; ty += tvy;
                    if (applyGravity) tvy += GRAVITY;
                    if(ty > GROUND_Y - ROCK_RADIUS || tx > WORLD_WIDTH + 60 || tx < -40) break;
                    if(Math.hypot(tx - CATAPULT_X, ty - CATAPULT_Y) > MAX_TRAJECTORY_LENGTH) break;
                    if(i%2 === 0) pts.push({x:tx, y:ty});
                }

            }
            function updateTrajectory() {

                const dragDist = Math.hypot(dx, dy);
                if(dragDist < 8) { trajectoryPoints = []; return; }
                const nx = dx/dragDist, ny = dy/dragDist, speed = dragDist * LAUNCH_POWER;

            }

            function circleRectCollision(cx,cy,cr,rx,ry,rw,rh) {

            function circleCircleCollision(x1,y1,r1,x2,y2,r2) { return Math.hypot(x2-x1,y2-y1)<r1+r2; }
            function spawnParticles(x,y,count,colors,power,sizeRange) {

            function spawnBlockDebris(block) { const cx=block.x+block.w/2, cy=block.y+block.h/2; spawnParticles(cx,cy,12, [block.color,'#b8a080','#d5c3a5','#a0896e'],5,[2,7]); }
            function explodeAt(x, y, radius, destroyBlocks = true) {

            // ===== PHYSICS (unchanged except updateActiveRocks has state change) =====
            function getSupportSides(block) {
                let leftSupported = false, rightSupported = false;
                for (const other of blocks) {
                    if (other === block || other.destroyed || other.falling || other.tilting) continue;
                    if (Math.abs((block.y + block.h) - other.y) < 4) {
                        if (other.x < block.x + 2 && other.x + other.w > block.x + 2) leftSupported = true;
                        if (other.x < block.x + block.w - 2 && other.x + other.w > block.x + block.w - 2) rightSupported = true;
                    }

            function markUnsupportedBlocks() {

                    changed = false; iterations++;
                    for (const block of blocks) {
                        if (block.destroyed || block.falling || block.tilting) continue;
                        const sides = getSupportSides(block);
                        if (!sides.left && !sides.right) { block.falling = true; block.vy = 1.5; block.vx = (Math.random() - 0.5) * 1.5; changed = true; }
                        else if (!sides.left || !sides.right) {
                            block.tilting = true;
                            if (sides.left && !sides.right) { block.pivotSide = 'left'; block.pivotX = block.x; block.pivotY = block.y + block.h; block.angularVelocity = 0.02; }
                            else { block.pivotSide = 'right'; block.pivotX = block.x + block.w; block.pivotY = block.y + block.h; block.angularVelocity = -0.02; }
                            changed = true;
                        }

            }
            function getRotatedAABB(block) {
                const cx = block.x + block.w/2, cy = block.y + block.h/2;
                const corners = [ { x: -block.w/2, y: -block.h/2 }, { x:  block.w/2, y: -block.h/2 }, { x:  block.w/2, y:  block.h/2 }, { x: -block.w/2, y:  block.h/2 } ];
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

            function updateEnemyPhysics() {
                if (stableCounter > 0 || gameState === 'bonus') return;
                for (const enemy of enemies) {
                    if (!enemy.alive) continue;
                    enemy.vy += GRAVITY; enemy.x += enemy.vx; enemy.y += enemy.vy;
                    if (enemy.y + enemy.radius >= GROUND_Y) { killEnemy(enemy, true); continue; }

            function updateTiltingBlocks() {
                if (stableCounter > 0 || gameState === 'bonus') return;
                for (const block of blocks) {
                    if (!block.tilting || block.destroyed) continue;
                    const sides = getSupportSides(block);

                    else { farCornerX = block.x; farCornerY = block.y + block.h; }

            function updateFallingBlocks() {

            function updateActiveRocks() {

                        for(const enemy of enemies) { if(enemy.alive&&circleCircleCollision(rock.x,rock.y,rock.radius,enemy.x,enemy.y,enemy.radius)) { killEnemy(enemy, true); break; } }

                        for(const enemy of enemies) { if(enemy.alive&&circleCircleCollision(rock.x,rock.y,rock.radius,enemy.x,enemy.y,enemy.radius)) { killEnemy(enemy, true); rock.vx *= 0.9; rock.vy *= 0.9; break; } }

                        for(const block of blocks) { if(!block.destroyed&&!block.falling&&!block.tilting) { const res=circleRectCollision(rock.x,rock.y,rock.radius,block.x,block.y,block.w,block.h); if(res.hit) { rock.x+=res.nx*res.overlap; rock.y+=res.ny*res.overlap; const dot=rock.vx*res.nx+rock.vy*res.ny; if(dot<0) { rock.vx-=2*dot*res.nx; rock.vy-=2*dot*res.ny; rock.vx*=BOUNCE_DAMPING; rock.vy*=BOUNCE_DAMPING; } block.hp-=Math.abs(dot)*0.55; if(block.hp<=0) destroyBlock(block); else { spawnParticles(res.closestX,res.closestY,3,[block.color,'#ddd'],1.5,[1,3]); playSound('hit'); } rock.bounces++; collided=true; break; } } }
                        if(!collided||rock.bounces<=3) { for(const enemy of enemies) { if(enemy.alive&&circleCircleCollision(rock.x,rock.y,rock.radius,enemy.x,enemy.y,enemy.radius)) { killEnemy(enemy); rock.vx*=0.5; rock.vy*=0.5; break; } } }

                        if(!collided||rock.bounces<=3) { for(const enemy of enemies) { if(enemy.alive&&circleCircleCollision(rock.x,rock.y,rock.radius,enemy.x,enemy.y,enemy.radius)) { if (rock.type === 'bomb_pig') { killEnemy(enemy, false); rock.active = false; explodeAt(rock.x, rock.y, BOMB_BLAST_RADIUS, true); break; } else { killEnemy(enemy); rock.vx*=0.5; rock.vy*=0.5; break; } } } }
                        if(rock.active && rock.type === 'bomb_pig') { for(const enemy of enemies) { if(enemy.alive&&circleCircleCollision(rock.x,rock.y,rock.radius,enemy.x,enemy.y,enemy.radius)) { killEnemy(enemy, false); rock.active = false; explodeAt(rock.x, rock.y, BOMB_BLAST_RADIUS, true); break; } } }
                        if(rock.y+rock.radius>GROUND_Y) { if (rock.type === 'bomb_pig') { rock.active = false; explodeAt(rock.x, GROUND_Y - rock.radius, BOMB_BLAST_RADIUS, true); } else { rock.y=GROUND_Y-rock.radius; rock.vy=-Math.abs(rock.vy)*GROUND_DAMPING; rock.vx*=FRICTION; rock.bounces++; if(Math.abs(rock.vy)<1.5) rock.vy=0; } }

                        gameState = 'bonus';

                    } else {

            }

            function updateParticles() { for(let i=particles.length-1;i>=0;i--) { const p=particles[i]; p.vy+=GRAVITY*0.6; p.x+=p.vx; p.y+=p.vy; p.life--; p.rotation+=p.rotSpeed; if(p.life<=0) particles.splice(i,1); } }

            function updateBonusSpawning() {

                    const minX = CATAPULT_X + 100, maxX = WORLD_WIDTH - 20;
                    const x = minX + Math.random() * (maxX - minX);
                    if (Math.random() < 0.6) { const material = Math.random() < 0.5 ? 'wood' : 'stone'; const block = createBlock(x, GROUND_Y, 30, 20, material); block.growing = true; block.targetY = GROUND_Y - (50 + Math.random() * 200); block.vy = -1.5; blocks.push(block); }
                    else { const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)]; const enemy = createEnemy(x, GROUND_Y, type); enemy.growing = true; enemy.targetY = GROUND_Y - (40 + Math.random() * 150); enemy.vy = -1.2; enemies.push(enemy); }
                }
                for (const block of blocks) { if (block.growing && !block.destroyed) { block.y += block.vy; if (block.y <= block.targetY) { block.y = block.targetY; block.vy = 0; block.growing = false; } } }
                for (const enemy of enemies) { if (enemy.growing && enemy.alive) { enemy.y += enemy.vy; if (enemy.y <= enemy.targetY) { enemy.y = enemy.targetY; enemy.vy = 0; enemy.growing = false; clampEnemyX(enemy); } } }
            }

            function checkWinLose() {
                if (gameState === 'bonus' || gameState === 'bonus_flying') return false;
                if(enemies.every(e=>!e.alive)) { gameState='won'; score+=rocksRemaining*50+level*100; updateUI(); restartBtn.textContent='🏆 Level '+level+' Cleared! Next →'; restartBtn.classList.add('visible'); instructionEl.style.opacity='0'; playSound('win'); return true; }
                if(rocksRemaining<=0 && gameState==='settling' && settleTimer<=0) { if(!blocks.some(b=>b.falling&&!b.destroyed)) { if(enemies.some(e=>e.alive)) { gameState='lost'; restartBtn.textContent='😞 Try Again'; restartBtn.classList.add('visible'); instructionEl.style.opacity='0'; playSound('lose'); return true; } } }
                return false;
            }

            function update() {
                if (stableCounter > 0) stableCounter--;
                if(screenShake>0) screenShake*=0.85; if(screenShake<0.1) screenShake=0;
                if (gameState === 'bonus' || gameState === 'bonus_flying') {
                    if (bonusStarted) { bonusTimeLeft -= 1/60; if (bonusTimeLeft <= 0) { endBonus(); return; } bonusTimerEl.textContent = Math.ceil(bonusTimeLeft); }
                }

                        drawSmallPig(pos.x + spacing, pos.y + spacing*0.6, ROCK_RADIUS*0.7);
                        drawSmallPig(pos.x, pos.y - spacing*0.8, ROCK_RADIUS*0.7);
                    } else if (type === 'air_strike') { drawRock({x:pos.x, y:pos.y, radius:ROCK_RADIUS, active:false, type:'air_strike'}); }
                    else { const radius = (type === 'big_pig') ? BIG_PIG_RADIUS : ROCK_RADIUS; drawRock({x:pos.x,y:pos.y,radius:radius,active:false,type:type}); }
                }
                drawParticles();
                ctx.restore();
                drawPigSelector();
                drawAmmoQueue();
                drawGameOverMessage();
                if((gameState==='aiming'||gameState==='bonus') && !isDragging && activeRocks.length===0) {
                    const pulse=0.4+Math.sin(Date.now()*0.005)*0.25;
                    ctx.fillStyle=`rgba(180,255,180,${pulse})`; ctx.beginPath();
                    ctx.arc(CATAPULT_X-cameraX, CATAPULT_Y, ROCK_RADIUS+5,0,Math.PI*2); ctx.fill();
                }
            }

            function gameLoop() { update(); render(); requestAnimationFrame(gameLoop); }

            restartBtn.addEventListener('click', (e)=>{ e.stopPropagation(); if(gameState==='won') nextLevel(); else if(gameState==='lost') retryLevel(); else initGame(); });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'c' || e.key === 'C') { pigSelectorVisible = !pigSelectorVisible; }
                if (e.key === 'r' || e.key === 'R') { if (gameState === 'won') nextLevel(); else if (gameState === 'lost') retryLevel(); else initGame(); }
            });

            initGame(true); gameLoop();
        })();
    </script>
</body>
</html>
