<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catapult Siege – Bomb, Sounds & Taller Wall</title>
    <style>
        :root { --bg: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent; touch-action: none;
        }
        .game-container {
            position: relative; border-radius: 16px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 3px #3d2b1f, 0 0 0 8px #1a1a2e, 0 0 0 11px #5c3d2e;
        }
        canvas { display: block; border-radius: 12px; cursor: crosshair; }
        .ui-overlay {
            position: absolute; top: 16px; left: 0; right: 0; display: flex;
            justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 10;
        }
        .ui-badge {
            background: rgba(0,0,0,0.65); color: #fff; padding: 8px 16px;
            border-radius: 20px; font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
            backdrop-filter: blur(8px); border: 2px solid rgba(255,255,255,0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .ui-badge.rocks { background: rgba(80,40,20,0.75); border-color: rgba(200,150,100,0.4); }
        .ui-badge.score { background: rgba(20,40,80,0.75); border-color: rgba(150,180,220,0.4); }
        .ui-badge.level { background: rgba(60,20,60,0.75); border-color: rgba(200,150,200,0.4); }
        .restart-btn {
            position: absolute; bottom: 50%; left: 50%; transform: translate(-50%, 50%);
            padding: 14px 36px; font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, #f7971e, #ff6a00); color: #fff;
            border: none; border-radius: 30px; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(255,106,0,0.5); z-index: 20; display: none;
            transition: all 0.3s ease; text-transform: uppercase;
        }
        .restart-btn:hover { transform: translate(-50%,50%) scale(1.06); }
        .restart-btn.visible { display: block; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes popIn { 0% { transform: translate(-50%,50%) scale(0.3); opacity: 0; } }
        .instruction {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600;
            pointer-events: none; z-index: 5; text-align: center;
            letter-spacing: 0.5px; text-shadow: 0 1px 3px rgba(0,0,0,0.7);
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-overlay">
            <div class="ui-badge rocks" id="rocksBadge">🐷 Pigs: 6</div>
            <div class="ui-badge level" id="levelBadge">🏚️ Level 1</div>
            <div class="ui-badge score" id="scoreBadge">⭐ Score: 0</div>
        </div>
        <button class="restart-btn" id="restartBtn">🔄 Play Again</button>
        <div class="instruction" id="instruction">Drag pig to aim • Drag background to scroll</div>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const restartBtn = document.getElementById('restartBtn');
            const rocksBadge = document.getElementById('rocksBadge');
            const scoreBadge = document.getElementById('scoreBadge');
            const levelBadge = document.getElementById('levelBadge');
            const instructionEl = document.getElementById('instruction');

            // --- Sound System ---
            let audioCtx = null;
            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }
            function playSound(type) {
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                switch(type) {
                    case 'launch':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(400, now + 0.2);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                        break;
                    case 'hit':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(80, now);
                        osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        osc.start(now); osc.stop(now + 0.2);
                        break;
                    case 'destroy':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                        gain.gain.setValueAtTime(0.25, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                        osc.start(now); osc.stop(now + 0.4);
                        break;
                    case 'explosion':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(20, now + 0.5);
                        gain.gain.setValueAtTime(0.4, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                        osc.start(now); osc.stop(now + 0.6);
                        break;
                    case 'death':
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(500, now);
                        osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        osc.start(now); osc.stop(now + 0.5);
                        break;
                    case 'win':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(523, now);
                        osc.frequency.setValueAtTime(659, now + 0.15);
                        osc.frequency.setValueAtTime(784, now + 0.3);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                        osc.start(now); osc.stop(now + 0.6);
                        break;
                    case 'lose':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                        osc.start(now); osc.stop(now + 0.6);
                        break;
                }
            }

            const WIDTH = 920, HEIGHT = 520;
            canvas.width = WIDTH; canvas.height = HEIGHT;
            function resizeCanvas() {
                const maxW = Math.min(window.innerWidth-20, 920), maxH = Math.min(window.innerHeight-20, 520);
                const scale = Math.min(maxW/WIDTH, maxH/HEIGHT);
                canvas.style.width = (WIDTH*scale)+'px'; canvas.style.height = (HEIGHT*scale)+'px';
            }
            resizeCanvas(); window.addEventListener('resize', resizeCanvas);

            const GRAVITY = 0.25;
            const LAUNCH_POWER = 0.16;
            const MAX_DRAG = 100;
            const GROUND_Y = 435;
            const CATAPULT_X = 135;
            const CATAPULT_Y = 280;
            const ROCK_RADIUS = 14;
            const BOUNCE_DAMPING = 0.35;
            const GROUND_DAMPING = 0.3;
            const FRICTION = 0.92;
            const MIN_SPEED_TO_END = 0.6;
            const MAX_ROCKS = 6;
            const WORLD_WIDTH = 1280;
            const MAX_TRAJECTORY_LENGTH = 460;
            const TILT_THRESHOLD = 0.4;

            let gameState = 'aiming', rocksRemaining = MAX_ROCKS, score = 0, level = 1;
            let activeRock = null, dragPos = null, isDragging = false;
            let blocks = [], enemies = [], particles = [];
            let screenShake = 0, settleTimer = 0, trajectoryPoints = [];
            let castleSeed = 0, lastTrajectory = null;
            let cameraX = 0, targetCameraX = 0;
            let isPanning = false, panLastScreenX = 0;

            const MATERIALS = {
                wood: { hp: 2, color: '#8B5A2B' },
                stone: { hp: 3, color: '#808080' },
                ice: { hp: 1, color: '#ADD8E6' }
            };

            function createBlock(x,y,w,h,material) {
                const mat = MATERIALS[material] || MATERIALS.wood;
                return {x,y,w,h,hp:mat.hp,maxHp:mat.hp,color:mat.color,material,
                    destroyed:false, falling:false, vy:0, vx:0,
                    angle:0, angularVelocity:0, tilting:false};
            }
            function createEnemy(x,y,type) {
                let radius = 13;
                if (type === 'big_red') radius = 16;
                else if (type === 'small_blue') radius = 9;
                return {x,y,radius,alive:true,vy:0,vx:0,type:type};
            }
            function createParticle(x,y,vx,vy,color,size,life) {
                return {x,y,vx,vy,color,size,life,maxLife:life,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.4};
            }

            function seededRandom(seed) { let s=seed; return ()=>{ s=(s*16807)%2147483647; return (s-1)/2147483646; }; }

            function placeEnemyOnBlock(enemy, blocks) {
                let bestBlock = null;
                for (const block of blocks) {
                    if (block.destroyed) continue;
                    if (enemy.x + enemy.radius > block.x && enemy.x - enemy.radius < block.x + block.w) {
                        if (block.y <= enemy.y) {
                            if (!bestBlock || block.y > bestBlock.y) {
                                bestBlock = block;
                            }
                        }
                    }
                }
                if (bestBlock) {
                    enemy.y = bestBlock.y - enemy.radius;
                } else {
                    const platW = 40, platH = 15;
                    const platX = enemy.x - platW/2, platY = GROUND_Y - platH;
                    blocks.push(createBlock(platX, platY, platW, platH, 'wood'));
                    enemy.y = platY - enemy.radius;
                }
            }

            const enemyTypes = ['big_red','round_black','triangle_yellow','small_blue'];

            function addRandomEnemy(x, y) {
                const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
                const enemy = createEnemy(x, y, type);
                enemies.push(enemy);
                placeEnemyOnBlock(enemy, blocks);
            }

            function addSmallBluePack(x, y) {
                for (let i = 0; i < 3; i++) {
                    const ex = x + (i - 1) * 20;
                    const enemy = createEnemy(ex, y, 'small_blue');
                    enemies.push(enemy);
                    placeEnemyOnBlock(enemy, blocks);
                }
            }

            function generateAngryBirdsStructure() {
                blocks = []; enemies = [];
                const rng = seededRandom(castleSeed);
                const startX = 960 + Math.floor(rng()*60);
                const plankH = 15, pillarW = 22, gap = 2;
                const addBlock = (x,y,w,h,material) => blocks.push(createBlock(x,y,w,h,material));

                // Special level 5: tall wall + bomb pig
                if (level === 5) {
                    const wallX = startX + 120;
                    const wallH = 160; // much taller wall
                    for (let y = GROUND_Y - wallH; y < GROUND_Y; y += plankH + gap) {
                        addBlock(wallX, y, pillarW, plankH, 'stone');
                        addBlock(wallX + pillarW + gap, y, pillarW, plankH, 'stone');
                    }
                    const platX = wallX + 80;
                    addBlock(platX, GROUND_Y - 40, 80, plankH, 'wood');
                    const bomb = createEnemy(platX + 40, GROUND_Y - 40 - 14, 'round_black');
                    enemies.push(bomb);
                    placeEnemyOnBlock(bomb, blocks);
                    addRandomEnemy(platX + 20, GROUND_Y - 40);
                    addRandomEnemy(platX + 60, GROUND_Y - 40);
                    addSmallBluePack(platX + 40, GROUND_Y - 70);
                    while (enemies.length < 6) {
                        const ex = startX + rng() * 200;
                        addRandomEnemy(ex, GROUND_Y - 30 - rng() * 80);
                    }
                    return;
                }

                const template = Math.floor(rng() * 6);
                switch(template) {
                    case 0: // Tall tower
                        const towerH0 = 120 + rng()*60;
                        const topY0 = GROUND_Y - towerH0;
                        addBlock(startX, topY0, pillarW, towerH0, 'wood');
                        addBlock(startX+80, topY0, pillarW, towerH0, 'stone');
                        const platforms = 3 + Math.floor(rng()*3);
                        for(let i=0; i<platforms; i++) {
                            const py = GROUND_Y - (towerH0/(platforms+1))*(i+1);
                            addBlock(startX, py-plankH, 80+pillarW, plankH, 'ice');
                            addRandomEnemy(startX + 40 + pillarW/2, py);
                        }
                        addBlock(startX, topY0-plankH, 80+pillarW, plankH, 'wood');
                        addRandomEnemy(startX + 40 + pillarW/2, topY0);
                        addRandomEnemy(startX + 20, GROUND_Y-16);
                        addRandomEnemy(startX + 80 + pillarW - 20, GROUND_Y-16);
                        break;
                    case 1: // Box fortress
                        const boxW = 120 + rng()*60, boxH = 80 + rng()*40;
                        addBlock(startX, GROUND_Y-plankH, boxW, plankH, 'stone');
                        addBlock(startX, GROUND_Y-boxH, pillarW, boxH, 'wood');
                        addBlock(startX+boxW-pillarW, GROUND_Y-boxH, pillarW, boxH, 'wood');
                        addBlock(startX, GROUND_Y-boxH-plankH, boxW, plankH, 'ice');
                        addBlock(startX+boxW*0.33, GROUND_Y-boxH, pillarW, boxH-plankH, 'stone');
                        addBlock(startX+boxW*0.66, GROUND_Y-boxH, pillarW, boxH-plankH, 'stone');
                        addRandomEnemy(startX+boxW/2, GROUND_Y-boxH+boxH/2);
                        addRandomEnemy(startX+boxW*0.33+pillarW/2, GROUND_Y-boxH+20);
                        addRandomEnemy(startX+boxW*0.66+pillarW/2, GROUND_Y-boxH+40);
                        addRandomEnemy(startX+boxW/2, GROUND_Y-boxH);
                        break;
                    case 2: // Stable pyramid
                        const blockSize = 28;
                        const pyramidHeight = 4 + Math.floor(rng()*3);
                        const topY = GROUND_Y - pyramidHeight * (plankH + gap);
                        const topBlockX = startX + 50;
                        addBlock(topBlockX, topY, blockSize, plankH, 'stone');
                        addRandomEnemy(topBlockX + blockSize/2, topY);
                        let prevRowX = topBlockX;
                        let prevRowW = blockSize;
                        let currentY = topY + plankH + gap;
                        for (let row = 1; row < pyramidHeight; row++) {
                            const leftBlockX = prevRowX - blockSize;
                            const rightBlockX = prevRowX + prevRowW;
                            for (let bx = leftBlockX; bx <= rightBlockX; bx += blockSize) {
                                addBlock(bx, currentY, blockSize - gap, plankH, 'wood');
                            }
                            addRandomEnemy(leftBlockX + (rightBlockX - leftBlockX + blockSize)/2, currentY);
                            prevRowX = leftBlockX;
                            prevRowW = (rightBlockX - leftBlockX + blockSize);
                            currentY += plankH + gap;
                        }
                        addRandomEnemy(startX + 20, GROUND_Y-16);
                        addRandomEnemy(startX + 80, GROUND_Y-16);
                        break;
                    case 3: // Wide bridge
                        const leftX = startX, rightX = leftX + 160 + rng()*80;
                        const pillarH = 80 + rng()*40;
                        addBlock(leftX, GROUND_Y-pillarH, pillarW, pillarH, 'stone');
                        addBlock(rightX, GROUND_Y-pillarH, pillarW, pillarH, 'stone');
                        const midX = leftX + (rightX - leftX)/2;
                        addBlock(midX, GROUND_Y-pillarH+20, pillarW, pillarH-20, 'wood');
                        addBlock(leftX, GROUND_Y-pillarH-plankH, rightX-leftX+pillarW, plankH, 'wood');
                        addRandomEnemy(leftX+pillarW/2, GROUND_Y-pillarH);
                        addRandomEnemy(rightX+pillarW/2, GROUND_Y-pillarH);
                        addRandomEnemy(midX+pillarW/2, GROUND_Y-pillarH+20);
                        addRandomEnemy(leftX+(rightX-leftX)/2+pillarW/2, GROUND_Y-pillarH);
                        addSmallBluePack(leftX+30, GROUND_Y-pillarH-plankH);
                        break;
                    case 4: // Two towers connected
                        const towerW = pillarW*2;
                        const leftTX = startX, rightTX = startX + 120 + rng()*60;
                        const towerH = 100 + rng()*50;
                        addBlock(leftTX, GROUND_Y-towerH, pillarW, towerH, 'stone');
                        addBlock(leftTX+towerW-pillarW, GROUND_Y-towerH, pillarW, towerH, 'wood');
                        addBlock(rightTX, GROUND_Y-towerH, pillarW, towerH, 'stone');
                        addBlock(rightTX+towerW-pillarW, GROUND_Y-towerH, pillarW, towerH, 'wood');
                        addBlock(leftTX, GROUND_Y-towerH-plankH, (rightTX-leftTX)+towerW, plankH, 'ice');
                        addRandomEnemy(leftTX+towerW/2, GROUND_Y-towerH);
                        addRandomEnemy(rightTX+towerW/2, GROUND_Y-towerH);
                        addRandomEnemy(leftTX+towerW/2, GROUND_Y-towerH);
                        addRandomEnemy((leftTX+rightTX+towerW)/2, GROUND_Y-16);
                        break;
                    case 5: // Complex castle
                        const baseW = 140 + rng()*60;
                        addBlock(startX, GROUND_Y-plankH, baseW, plankH, 'stone');
                        addBlock(startX, GROUND_Y-plankH-50, pillarW, 50, 'wood');
                        addBlock(startX+baseW-pillarW, GROUND_Y-plankH-50, pillarW, 50, 'wood');
                        addBlock(startX, GROUND_Y-plankH-50-plankH, baseW, plankH, 'ice');
                        const smallTowerH = 60;
                        addBlock(startX, GROUND_Y-plankH-50-smallTowerH, pillarW, smallTowerH, 'stone');
                        addBlock(startX, GROUND_Y-plankH-50-smallTowerH-plankH, pillarW*2, plankH, 'ice');
                        addRandomEnemy(startX + pillarW, GROUND_Y-plankH-50-smallTowerH);
                        addRandomEnemy(startX + baseW/2, GROUND_Y-plankH-25);
                        addRandomEnemy(startX + baseW*0.3, GROUND_Y-plankH-35);
                        addRandomEnemy(startX + baseW*0.7, GROUND_Y-plankH-35);
                        addSmallBluePack(startX + baseW/2, GROUND_Y-plankH-45);
                        break;
                }

                while (enemies.length < 6) {
                    const ex = startX + rng() * 200;
                    const ey = GROUND_Y - 30 - rng() * 80;
                    addRandomEnemy(ex, Math.max(GROUND_Y-80, ey));
                }
                if (enemies.length > 18) enemies.splice(18);
            }

            function initGame() {
                rocksRemaining = MAX_ROCKS; score = 0; gameState = 'aiming';
                activeRock = null; dragPos = null; isDragging = false;
                particles = []; screenShake = 0; settleTimer = 0; trajectoryPoints = [];
                lastTrajectory = null; cameraX = 0; targetCameraX = 0;
                castleSeed = level * 7777; // deterministic first 10
                generateAngryBirdsStructure(); updateUI();
                restartBtn.classList.remove('visible'); instructionEl.style.opacity = '1';
            }
            function nextLevel() {
                level++; rocksRemaining = MAX_ROCKS; score = 0; gameState = 'aiming';
                activeRock = null; dragPos = null; isDragging = false;
                particles = []; screenShake = 0; settleTimer = 0; trajectoryPoints = [];
                lastTrajectory = null; cameraX = 0; targetCameraX = 0;
                castleSeed = level * 7777;
                generateAngryBirdsStructure(); updateUI();
                restartBtn.classList.remove('visible'); instructionEl.style.opacity = '1';
            }
            function updateUI() {
                rocksBadge.textContent = '🐷 Pigs: ' + rocksRemaining;
                scoreBadge.textContent = '⭐ Score: ' + score;
                levelBadge.textContent = '🏚️ Level ' + level;
            }

            function getCanvasScale() { return WIDTH / canvas.getBoundingClientRect().width; }
            function screenToWorld(screenX, screenY) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = WIDTH/rect.width, scaleY = HEIGHT/rect.height;
                return { x: (screenX - rect.left) * scaleX + cameraX, y: (screenY - rect.top) * scaleY };
            }

            function handleMouseDown(e) {
                initAudio();
                if(gameState !== 'aiming') return;
                const worldPos = screenToWorld(e.clientX, e.clientY);
                const dist = Math.hypot(worldPos.x - CATAPULT_X, worldPos.y - CATAPULT_Y);
                if(dist < 55) {
                    isDragging = true;
                    dragPos = {x: worldPos.x, y: worldPos.y};
                    instructionEl.style.opacity = '0.3';
                } else {
                    isPanning = true;
                    panLastScreenX = e.clientX;
                    canvas.style.cursor = 'grab';
                }
            }
            function handleMouseMove(e) {
                if(isDragging) {
                    const worldPos = screenToWorld(e.clientX, e.clientY);
                    let dx = worldPos.x - CATAPULT_X, dy = worldPos.y - CATAPULT_Y;
                    const dist = Math.hypot(dx, dy);
                    if(dist > MAX_DRAG) { const s = MAX_DRAG/dist; dx *= s; dy *= s; }
                    dragPos = {x: CATAPULT_X + dx, y: CATAPULT_Y + dy};
                    updateTrajectory();
                } else if(isPanning) {
                    const scale = getCanvasScale();
                    const deltaX = (e.clientX - panLastScreenX) * scale;
                    cameraX = Math.max(0, Math.min(WORLD_WIDTH - WIDTH, cameraX - deltaX));
                    targetCameraX = cameraX;
                    panLastScreenX = e.clientX;
                }
            }
            function handleMouseUp(e) {
                if(isDragging) {
                    isDragging = false;
                    instructionEl.style.opacity = '0';
                    const dx = CATAPULT_X - dragPos.x, dy = CATAPULT_Y - dragPos.y;
                    const dragDist = Math.hypot(dx, dy);
                    if(dragDist < 8) {
                        dragPos = null; trajectoryPoints = [];
                        instructionEl.style.opacity = '1'; return;
                    }
                    if(trajectoryPoints.length > 0) {
                        lastTrajectory = trajectoryPoints.map(p => ({x:p.x, y:p.y}));
                    }
                    const nx = dx/dragDist, ny = dy/dragDist, speed = dragDist * LAUNCH_POWER;
                    activeRock = {x:dragPos.x, y:dragPos.y, vx:nx*speed, vy:ny*speed, radius:ROCK_RADIUS, active:true, bounces:0};
                    rocksRemaining--;
                    gameState = 'flying';
                    dragPos = null; trajectoryPoints = [];
                    playSound('launch');
                    updateUI();
                } else if(isPanning) {
                    isPanning = false;
                    canvas.style.cursor = 'crosshair';
                }
            }
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('mouseleave', ()=>{
                if(isDragging) handleMouseUp({});
                if(isPanning) { isPanning = false; canvas.style.cursor = 'crosshair'; }
            });
            canvas.addEventListener('touchstart', (e)=>{
                e.preventDefault();
                initAudio();
                if(e.touches.length === 1) handleMouseDown(e.touches[0]);
            }, {passive: false});
            canvas.addEventListener('touchmove', (e)=>{
                e.preventDefault();
                if(e.touches.length === 1) handleMouseMove(e.touches[0]);
            }, {passive: false});
            canvas.addEventListener('touchend', (e)=>{
                e.preventDefault();
                handleMouseUp(e);
            });
            canvas.addEventListener('touchcancel', ()=>{
                if(isDragging) handleMouseUp({});
                if(isPanning) { isPanning = false; canvas.style.cursor = 'crosshair'; }
            });

            function updateTrajectory() {
                if(!dragPos) { trajectoryPoints = []; return; }
                const dx = CATAPULT_X - dragPos.x, dy = CATAPULT_Y - dragPos.y;
                const dragDist = Math.hypot(dx, dy);
                if(dragDist < 8) { trajectoryPoints = []; return; }
                const nx = dx/dragDist, ny = dy/dragDist, speed = dragDist * LAUNCH_POWER;
                let tx = dragPos.x, ty = dragPos.y, tvx = nx*speed, tvy = ny*speed;
                trajectoryPoints = [];
                for(let i=0; i<100; i++) {
                    tx += tvx; ty += tvy; tvy += GRAVITY;
                    if(ty > GROUND_Y - ROCK_RADIUS || tx > WORLD_WIDTH + 60 || tx < -40) break;
                    if(Math.hypot(tx - CATAPULT_X, ty - CATAPULT_Y) > MAX_TRAJECTORY_LENGTH) break;
                    if(i%2 === 0) trajectoryPoints.push({x:tx, y:ty});
                }
            }

            function circleRectCollision(cx,cy,cr,rx,ry,rw,rh) {
                const closestX = Math.max(rx, Math.min(cx, rx+rw));
                const closestY = Math.max(ry, Math.min(cy, ry+rh));
                const distX = cx-closestX, distY = cy-closestY, dist = Math.hypot(distX,distY);
                if(dist < cr) {
                    const overlap = cr - dist;
                    const nx = dist>0.001 ? distX/dist : 0, ny = dist>0.001 ? distY/dist : -1;
                    return {hit:true, overlap, nx, ny, closestX, closestY};
                }
                return {hit:false};
            }
            function circleCircleCollision(x1,y1,r1,x2,y2,r2) { return Math.hypot(x2-x1,y2-y1)<r1+r2; }

            function spawnParticles(x,y,count,colors,power,sizeRange) {
                for(let i=0;i<count;i++) {
                    const angle = Math.random()*Math.PI*2, speed = (Math.random()*0.7+0.3)*power;
                    particles.push(createParticle(x,y, Math.cos(angle)*speed, Math.sin(angle)*speed-Math.random()*power*0.8,
                        colors[Math.floor(Math.random()*colors.length)], sizeRange[0]+Math.random()*(sizeRange[1]-sizeRange[0]), 25+Math.random()*35));
                }
            }
            function spawnBlockDebris(block) {
                const cx=block.x+block.w/2, cy=block.y+block.h/2;
                spawnParticles(cx,cy,12, [block.color,'#b8a080','#d5c3a5','#a0896e'],5,[2,7]);
            }
            function explodeAt(x, y, radius) {
                if (activeRock && activeRock.active && Math.hypot(activeRock.x - x, activeRock.y - y) < radius) {
                    activeRock.active = false;
                    spawnParticles(activeRock.x, activeRock.y, 20, ['#66bb66','#2d6a2d','#88cc88'], 6, [3,10]);
                    if (gameState === 'flying') {
                        gameState = 'settling';
                        settleTimer = 45;
                    }
                }
                // Damage blocks only – not enemies
                for (const block of blocks) {
                    if (block.destroyed) continue;
                    const dist = Math.hypot(block.x+block.w/2 - x, block.y+block.h/2 - y);
                    if (dist < radius) {
                        block.hp -= 3;
                        if (block.hp <= 0) destroyBlock(block);
                    }
                }
                spawnParticles(x, y, 30, ['#ff6600','#ff0000','#ffff00','#000000'], 8, [2,10]);
                screenShake = Math.max(screenShake, 12);
                playSound('explosion');
            }

            function spawnEnemyDeath(enemy) {
                let colors = ['#ff4444','#ff6666'];
                if(enemy.type === 'big_red') colors = ['#ff0000','#cc0000'];
                else if(enemy.type === 'round_black') colors = ['#333','#111'];
                else if(enemy.type === 'triangle_yellow') colors = ['#ffdd00','#ffaa00'];
                else if(enemy.type === 'small_blue') colors = ['#4444ff','#2222cc'];
                spawnParticles(enemy.x,enemy.y,20, colors,4,[1.5,5]);
                screenShake = Math.max(screenShake,6);
            }
            function destroyBlock(block) {
                if(block.destroyed) return; block.destroyed=true; spawnBlockDebris(block);
                score+=block.maxHp*15; screenShake=Math.max(screenShake,4+block.maxHp);
                playSound('destroy');
                updateUI();
            }
            function killEnemy(enemy, explodeBlack = true) {
                if(!enemy.alive) return;
                enemy.alive = false;
                if (enemy.type === 'round_black' && explodeBlack) {
                    explodeAt(enemy.x, enemy.y, 60);
                }
                spawnEnemyDeath(enemy);
                score+=100; screenShake=Math.max(screenShake,7);
                playSound('death');
                updateUI();
            }

            function getSupportSides(block) {
                let leftSupported = false, rightSupported = false;
                for (const other of blocks) {
                    if (other === block || other.destroyed || other.falling || other.tilting) continue;
                    const otherTop = other.y;
                    if (Math.abs((block.y + block.h) - otherTop) < 4) {
                        if (other.x < block.x + 2 && other.x + other.w > block.x + 2) leftSupported = true;
                        if (other.x < block.x + block.w - 2 && other.x + other.w > block.x + block.w - 2) rightSupported = true;
                    }
                }
                if (block.y + block.h >= GROUND_Y - 2) leftSupported = rightSupported = true;
                return {left: leftSupported, right: rightSupported};
            }

            function checkBlockSupport(block) {
                if(block.destroyed||block.falling || block.tilting) return true;
                if(block.y+block.h>=GROUND_Y-2) return true;
                for(const other of blocks) {
                    if(other===block||other.destroyed||other.falling||other.tilting) continue;
                    if(Math.abs((block.y+block.h)-other.y)<4) {
                        const overlapLeft=Math.max(block.x,other.x), overlapRight=Math.min(block.x+block.w,other.x+other.w);
                        if(overlapRight-overlapLeft>16) return true;
                    }
                }
                return false;
            }

            function markUnsupportedBlocks() {
                let changed=true, iterations=0;
                while(changed && iterations<10) {
                    changed=false; iterations++;
                    for(const block of blocks) {
                        if(block.destroyed||block.falling||block.tilting) continue;
                        const supported = checkBlockSupport(block);
                        if (!supported) {
                            const sides = getSupportSides(block);
                            if (sides.left && !sides.right) {
                                block.tilting = true; block.angularVelocity = 0.02;
                            } else if (!sides.left && sides.right) {
                                block.tilting = true; block.angularVelocity = -0.02;
                            } else {
                                block.falling = true; block.vy = 1.5; block.vx = (Math.random()-0.5)*1.5;
                            }
                            changed = true;
                        }
                    }
                }
            }

            function updateTiltingBlocks() {
                for (const block of blocks) {
                    if (!block.tilting || block.destroyed) continue;
                    block.angularVelocity += 0.001;
                    block.angle += block.angularVelocity;
                    if (Math.abs(block.angle) > TILT_THRESHOLD) {
                        block.tilting = false;
                        block.falling = true;
                        block.vy = 1;
                        block.vx = (Math.random()-0.5)*0.5;
                    }
                }
            }

            function updateEnemyPhysics() {
                for(const enemy of enemies) {
                    if(!enemy.alive) continue;
                    enemy.vy += GRAVITY;
                    enemy.x += enemy.vx;
                    enemy.y += enemy.vy;
                    if(enemy.y + enemy.radius >= GROUND_Y) {
                        killEnemy(enemy, true);
                        continue;
                    }
                    for(const block of blocks) {
                        if(block.destroyed || block.tilting) continue;
                        const res = circleRectCollision(enemy.x, enemy.y, enemy.radius, block.x, block.y, block.w, block.h);
                        if(res.hit) {
                            enemy.x += res.nx * res.overlap;
                            enemy.y += res.ny * res.overlap;
                            if(Math.abs(res.ny) > 0.5 && enemy.vy > 0) {
                                enemy.vy = Math.min(enemy.vy, 0);
                                enemy.vx *= 0.9;
                            } else {
                                const dot = enemy.vx * res.nx + enemy.vy * res.ny;
                                if(dot < 0) {
                                    enemy.vx -= dot * res.nx;
                                    enemy.vy -= dot * res.ny;
                                    enemy.vx *= 0.5;
                                    enemy.vy *= 0.5;
                                }
                            }
                        }
                    }
                    if(enemy.y > HEIGHT + 100) enemy.alive = false;
                }
            }

            function updateFallingBlocks() {
                for(const block of blocks) {
                    if(!block.falling||block.destroyed) continue;
                    block.vy+=GRAVITY; block.y+=block.vy; block.x+=block.vx;
                    for(const enemy of enemies) {
                        if(!enemy.alive) continue;
                        const cx=Math.max(block.x,Math.min(enemy.x,block.x+block.w));
                        const cy=Math.max(block.y,Math.min(enemy.y,block.y+block.h));
                        if(Math.hypot(enemy.x-cx,enemy.y-cy)<enemy.radius+4) { killEnemy(enemy); block.vy*=0.5; }
                    }
                    if(block.y+block.h>=GROUND_Y) {
                        block.y=GROUND_Y-block.h; block.falling=false; block.vy=0; block.vx=0;
                        screenShake=Math.max(screenShake,3);
                        for(const enemy of enemies) if(enemy.alive&&enemy.x>block.x-5&&enemy.x<block.x+block.w+5&&enemy.y>=GROUND_Y-35&&enemy.y<=GROUND_Y) killEnemy(enemy);
                        markUnsupportedBlocks();
                    }
                    for(const other of blocks) {
                        if(other===block||other.destroyed||other.falling||other.tilting) continue;
                        if(block.y+block.h>=other.y && block.y+block.h<=other.y+other.h+6 && block.vy>0) {
                            const overlapLeft=Math.max(block.x,other.x), overlapRight=Math.min(block.x+block.w,other.x+other.w);
                            if(overlapRight-overlapLeft>14) {
                                block.y=other.y-block.h; block.falling=false; block.vy=0; block.vx=0;
                                for(const enemy of enemies) if(enemy.alive&&Math.abs(enemy.y-(other.y-enemy.radius))<10&&enemy.x>other.x-8&&enemy.x<other.x+other.w+8) killEnemy(enemy);
                                markUnsupportedBlocks(); break;
                            }
                        }
                    }
                    if(block.y>HEIGHT+100) { block.destroyed=true; block.falling=false; }
                }
            }

            function updateActiveRock() {
                if(!activeRock||!activeRock.active) return;
                const rock=activeRock; rock.vy+=GRAVITY; rock.x+=rock.vx; rock.y+=rock.vy;
                let collided=false;
                for(const block of blocks) {
                    if(block.destroyed||block.falling||block.tilting) continue;
                    const res=circleRectCollision(rock.x,rock.y,rock.radius,block.x,block.y,block.w,block.h);
                    if(res.hit) {
                        rock.x+=res.nx*res.overlap; rock.y+=res.ny*res.overlap;
                        const dot=rock.vx*res.nx+rock.vy*res.ny;
                        if(dot<0) { rock.vx-=2*dot*res.nx; rock.vy-=2*dot*res.ny; rock.vx*=BOUNCE_DAMPING; rock.vy*=BOUNCE_DAMPING; }
                        block.hp-=Math.abs(dot)*0.55;
                        if(block.hp<=0) { destroyBlock(block); markUnsupportedBlocks(); }
                        else { spawnParticles(res.closestX,res.closestY,3,[block.color,'#ddd'],1.5,[1,3]); playSound('hit'); }
                        rock.bounces++; collided=true; break;
                    }
                }
                if(!collided||rock.bounces<=3) for(const enemy of enemies) if(enemy.alive&&circleCircleCollision(rock.x,rock.y,rock.radius,enemy.x,enemy.y,enemy.radius)) { killEnemy(enemy); rock.vx*=0.5; rock.vy*=0.5; break; }
                if(rock.y+rock.radius>GROUND_Y) {
                    rock.y=GROUND_Y-rock.radius; rock.vy=-Math.abs(rock.vy)*GROUND_DAMPING; rock.vx*=FRICTION; rock.bounces++;
                    if(Math.abs(rock.vy)<1.5) rock.vy=0;
                    spawnParticles(rock.x,GROUND_Y,4,['#8b7355','#a0896e','#c4b898'],1.5,[1,3]);
                }
                const speed=Math.hypot(rock.vx,rock.vy);
                if((speed<MIN_SPEED_TO_END&&rock.y+rock.radius>=GROUND_Y-3)||rock.bounces>6||rock.x>WORLD_WIDTH+60||rock.x<-60||rock.y>HEIGHT+60) {
                    rock.active=false; gameState='settling'; settleTimer=45;
                }
            }

            function updateParticles() {
                for(let i=particles.length-1;i>=0;i--) { const p=particles[i]; p.vy+=GRAVITY*0.6; p.x+=p.vx; p.y+=p.vy; p.life--; p.rotation+=p.rotSpeed; if(p.life<=0) particles.splice(i,1); }
            }

            function checkWinLose() {
                if(enemies.every(e=>!e.alive)) {
                    gameState='won'; score+=rocksRemaining*50+level*100; updateUI();
                    restartBtn.textContent='🏆 Level '+level+' Cleared! Next →'; restartBtn.classList.add('visible'); instructionEl.style.opacity='0';
                    playSound('win');
                    return true;
                }
                if(rocksRemaining<=0&&gameState==='settling'&&settleTimer<=0) {
                    if(!blocks.some(b=>b.falling&&!b.destroyed)) {
                        if(enemies.some(e=>e.alive)) {
                            gameState='lost'; restartBtn.textContent='😞 Try Again'; restartBtn.classList.add('visible'); instructionEl.style.opacity='0';
                            playSound('lose');
                            return true;
                        }
                    }
                }
                return false;
            }

            function update() {
                if(screenShake>0) screenShake*=0.85; if(screenShake<0.1) screenShake=0;
                updateParticles();
                updateTiltingBlocks();
                updateEnemyPhysics();
                updateFallingBlocks();

                if(gameState==='flying' && activeRock && activeRock.active) {
                    targetCameraX = Math.max(0, Math.min(WORLD_WIDTH-WIDTH, activeRock.x - WIDTH*0.35));
                }

                if(gameState==='flying') {
                    updateActiveRock();
                }

                if(gameState==='settling') {
                    settleTimer--;
                    updateFallingBlocks();
                    updateTiltingBlocks();
                    updateEnemyPhysics();
                    if(settleTimer<=0) {
                        if(!checkWinLose()) {
                            if(rocksRemaining>0) {
                                gameState='aiming';
                                activeRock=null; dragPos=null; trajectoryPoints=[];
                                targetCameraX = 0;
                                instructionEl.style.opacity='1';
                            } else if(enemies.every(e=>!e.alive)) {
                                gameState='won'; score+=level*100; updateUI();
                                restartBtn.textContent='🏆 Level '+level+' Cleared! Next →'; restartBtn.classList.add('visible');
                                playSound('win');
                            } else {
                                gameState='lost'; restartBtn.textContent='😞 Try Again'; restartBtn.classList.add('visible'); instructionEl.style.opacity='0';
                                playSound('lose');
                            }
                        }
                    }
                }

                if(blocks.some(b=>b.falling&&!b.destroyed)) markUnsupportedBlocks();

                if(!isPanning) {
                    cameraX += (targetCameraX - cameraX) * 0.12;
                    if(Math.abs(targetCameraX - cameraX) < 0.05) cameraX = targetCameraX;
                }

                updateUI();
            }

            function drawSky() {
                ctx.fillStyle = '#87CEEB'; ctx.fillRect(-200,0,WORLD_WIDTH+400,GROUND_Y);
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                [80,350,650,880,1050].forEach((cx,i)=>{
                    const sc=[1,1.3,0.9,1.1,0.7], ys=[50,30,60,25,80];
                    ctx.save(); ctx.translate(cx,ys[i]); ctx.scale(sc[i],sc[i]);
                    ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.arc(25,-5,18,0,Math.PI*2); ctx.arc(50,0,22,0,Math.PI*2); ctx.arc(20,8,16,0,Math.PI*2); ctx.arc(40,5,15,0,Math.PI*2); ctx.fill(); ctx.restore();
                });
            }
            function drawGround() {
                const grad=ctx.createLinearGradient(0,GROUND_Y,0,HEIGHT);
                grad.addColorStop(0,'#7a9a4b'); grad.addColorStop(0.3,'#5a7030'); grad.addColorStop(1,'#3d4a20');
                ctx.fillStyle=grad; ctx.fillRect(-200,GROUND_Y,WORLD_WIDTH+400,HEIGHT-GROUND_Y);
                ctx.fillStyle='#8db850';
                for(let i=-200;i<WORLD_WIDTH+400;i+=18) { const h=4+Math.sin(i*0.5)*3; ctx.fillRect(i,GROUND_Y-h,3,h+2); }
                ctx.strokeStyle='#5a7030'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-200,GROUND_Y); ctx.lineTo(WORLD_WIDTH+400,GROUND_Y); ctx.stroke();
            }
            function drawCatapult() {
                const cx=CATAPULT_X, baseY=GROUND_Y;
                ctx.fillStyle='#5c3d2e'; ctx.fillRect(cx-30,baseY-14,60,16);
                ctx.fillStyle='#7a5233'; ctx.fillRect(cx-26,baseY-18,52,8);
                ctx.fillStyle='#3d2010'; ctx.beginPath(); ctx.arc(cx-18,baseY-4,10,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx+18,baseY-4,10,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#5a3520'; ctx.beginPath(); ctx.arc(cx-18,baseY-4,5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx+18,baseY-4,5,0,Math.PI*2); ctx.fill();
                const postTopY = CATAPULT_Y - 22;
                ctx.strokeStyle='#6b3d20'; ctx.lineWidth=7; ctx.lineCap='round';
                ctx.beginPath(); ctx.moveTo(cx-16, baseY-14); ctx.lineTo(cx-14, postTopY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx+16, baseY-14); ctx.lineTo(cx+14, postTopY); ctx.stroke();
                ctx.strokeStyle='#5a3018'; ctx.lineWidth=4;
                ctx.beginPath(); ctx.moveTo(cx-14, postTopY+20); ctx.lineTo(cx+14, postTopY+20); ctx.stroke();
                const rockPos=(isDragging&&dragPos)?dragPos:{x:cx,y:CATAPULT_Y};
                ctx.strokeStyle='#4a2810'; ctx.lineWidth=3.5;
                ctx.beginPath(); ctx.moveTo(cx-14, postTopY); ctx.lineTo(rockPos.x-4, rockPos.y-2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx+14, postTopY); ctx.lineTo(rockPos.x+4, rockPos.y-2); ctx.stroke();
                ctx.strokeStyle='#6b4a28'; ctx.lineWidth=1.5;
                ctx.beginPath(); ctx.moveTo(cx-13, postTopY); ctx.lineTo(rockPos.x-3, rockPos.y-1); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx+13, postTopY); ctx.lineTo(rockPos.x+3, rockPos.y-1); ctx.stroke();
            }
            function drawBlock(block) {
                if(block.destroyed) return;
                const {x,y,w,h,hp,maxHp,color,falling,angle} = block;
                ctx.save();
                const cx = x + w/2, cy = y + h/2;
                ctx.translate(cx, cy);
                ctx.rotate(angle);
                const factor=1-(hp/maxHp)*0.4;
                ctx.fillStyle=color;
                ctx.fillRect(-w/2, -h/2, w, h);
                const hl=ctx.createLinearGradient(-w/2,-h/2,-w/2,h/2);
                hl.addColorStop(0,'rgba(255,255,255,0.25)'); hl.addColorStop(1,'rgba(0,0,0,0.15)');
                ctx.fillStyle=hl; ctx.fillRect(-w/2,-h/2,w,h);
                ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1.5; ctx.strokeRect(-w/2,-h/2,w,h);
                if(hp<maxHp) {
                    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.8;
                    for(let i=0;i<maxHp-Math.ceil(hp);i++) {
                        ctx.beginPath(); ctx.moveTo(-w/2+w*0.3,-h/2+h*0.3); ctx.lineTo(-w/2+w*0.5,-h/2+h*0.6); ctx.stroke();
                    }
                }
                ctx.restore();
            }
            function drawEnemy(enemy) {
                if(!enemy.alive) return;
                const {x,y,radius,type} = enemy;
                ctx.save();
                ctx.translate(x, y);
                if (type === 'big_red') {
                    ctx.fillStyle = '#cc0000'; ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(-5, -4, 4, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(5, -4, 4, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(-4, -4, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(6, -4, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(-8, 4); ctx.lineTo(8, 4); ctx.lineWidth=2; ctx.strokeStyle='#000'; ctx.stroke();
                } else if (type === 'round_black') {
                    // Bomb shape: dark circle with a lit fuse and skull
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath(); ctx.arc(0, 0, radius*0.9, 0, Math.PI*2); ctx.fill();
                    // Skull (simplified)
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(0, -2, radius*0.4, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath(); ctx.arc(-2, -2, radius*0.15, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(2, -2, radius*0.15, 0, Math.PI*2); ctx.fill();
                    ctx.fillRect(-1.5, -1, 3, 1.5);
                    // Fuse
                    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(0, -radius*0.9); ctx.lineTo(radius*0.4, -radius*1.3);
                    ctx.stroke();
                    ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.arc(radius*0.4, -radius*1.3, 3, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(radius*0.4, -radius*1.3, 1.5, 0, Math.PI*2); ctx.fill();
                } else if (type === 'triangle_yellow') {
                    ctx.fillStyle = '#ffdd00';
                    ctx.beginPath(); ctx.moveTo(0, -radius); ctx.lineTo(-radius*0.8, radius*0.6); ctx.lineTo(radius*0.8, radius*0.6); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(-3, -2, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(3, -2, 2, 0, Math.PI*2); ctx.fill();
                } else if (type === 'small_blue') {
                    ctx.fillStyle = '#4466ff'; ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(-3, -2, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(3, -2, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(-3, -2, 1.2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(3, -2, 1.2, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
            function drawRock(rock) {
                const {x,y,radius}=rock;
                ctx.save();
                ctx.translate(x, y);
                ctx.fillStyle = '#66bb66';
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#88cc88';
                ctx.beginPath(); ctx.ellipse(0, radius*0.3, radius*0.5, radius*0.3, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#2d6a2d';
                ctx.beginPath(); ctx.arc(-radius*0.2, radius*0.3, radius*0.12, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius*0.2, radius*0.3, radius*0.12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(-radius*0.35, -radius*0.25, radius*0.25, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius*0.35, -radius*0.25, radius*0.25, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(-radius*0.3, -radius*0.25, radius*0.12, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius*0.4, -radius*0.25, radius*0.12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#2d6a2d';
                ctx.beginPath(); ctx.ellipse(-radius*0.6, -radius*0.5, radius*0.25, radius*0.15, -0.3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(radius*0.6, -radius*0.5, radius*0.25, radius*0.15, 0.3, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#1b3b1b'; ctx.lineWidth = 1.8;
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            }
            function drawAmmoQueue() {
                if (gameState !== 'aiming' && gameState !== 'flying' && gameState !== 'settling') return;
                const queueX = CATAPULT_X - 40;
                const startY = CATAPULT_Y + 40;
                const spacing = 18;
                for (let i = 0; i < rocksRemaining; i++) {
                    const y = startY + i * spacing;
                    const alpha = 0.5;
                    const scale = 0.7;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.translate(queueX, y);
                    ctx.scale(scale, scale);
                    ctx.fillStyle = '#66bb66';
                    ctx.beginPath(); ctx.arc(0, 0, ROCK_RADIUS*0.7, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#88cc88';
                    ctx.beginPath(); ctx.ellipse(0, 3, 4, 2.5, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#2d6a2d';
                    ctx.beginPath(); ctx.arc(-1.5, 3, 1, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(1.5, 3, 1, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(-3, -2, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(3, -2, 2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(-2.5, -2, 1, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(3.5, -2, 1, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }
            }
            function drawLastTrajectory() {
                if(!lastTrajectory || lastTrajectory.length<2) return;
                ctx.strokeStyle='rgba(200,255,200,0.3)'; ctx.lineWidth=2; ctx.setLineDash([6,8]);
                ctx.beginPath(); ctx.moveTo(lastTrajectory[0].x, lastTrajectory[0].y);
                for(let i=1;i<lastTrajectory.length;i++) ctx.lineTo(lastTrajectory[i].x, lastTrajectory[i].y);
                ctx.stroke(); ctx.setLineDash([]);
            }
            function drawTrajectory() {
                if(!trajectoryPoints||trajectoryPoints.length<2) return;
                for(let i=0;i<trajectoryPoints.length;i++) {
                    const pt=trajectoryPoints[i], alpha=0.35+(i/trajectoryPoints.length)*0.5;
                    ctx.fillStyle=`rgba(180,255,180,${alpha})`; ctx.beginPath();
                    ctx.arc(pt.x,pt.y,3.5-(i/trajectoryPoints.length)*2.2,0,Math.PI*2); ctx.fill();
                }
            }
            function drawParticles() { for(const p of particles) { ctx.save(); ctx.globalAlpha=p.life/p.maxLife; ctx.translate(p.x,p.y); ctx.rotate(p.rotation); ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size); ctx.restore(); } }
            function drawGameOverMessage() {
                if(gameState==='won') { ctx.fillStyle='rgba(0,30,0,0.7)'; ctx.fillRect(0,HEIGHT/2-45,WIDTH,90); ctx.fillStyle='#ffdd57'; ctx.font='bold 40px "Segoe UI"'; ctx.textAlign='center'; ctx.fillText('🏆 STRUCTURE DESTROYED!',WIDTH/2,HEIGHT/2+10); }
                else if(gameState==='lost') { ctx.fillStyle='rgba(40,0,0,0.7)'; ctx.fillRect(0,HEIGHT/2-45,WIDTH,90); ctx.fillStyle='#ff8888'; ctx.font='bold 36px "Segoe UI"'; ctx.textAlign='center'; ctx.fillText('😞 Enemies Survived!',WIDTH/2,HEIGHT/2+10); }
            }
            function render() {
                ctx.clearRect(0,0,WIDTH,HEIGHT);
                let shakeX=0,shakeY=0;
                if(screenShake>0.2) { shakeX=(Math.random()-0.5)*screenShake*2; shakeY=(Math.random()-0.5)*screenShake*2; }
                ctx.save(); ctx.translate(-cameraX+shakeX, shakeY);
                drawSky(); drawGround(); drawCatapult();
                drawLastTrajectory(); drawTrajectory();
                for(const b of blocks) drawBlock(b);
                for(const e of enemies) drawEnemy(e);
                if(activeRock&&activeRock.active) drawRock(activeRock);
                if(gameState==='aiming'&&!activeRock) {
                    const pos=(isDragging&&dragPos)?dragPos:{x:CATAPULT_X,y:CATAPULT_Y};
                    drawRock({x:pos.x,y:pos.y,radius:ROCK_RADIUS,active:false});
                }
                drawParticles();
                ctx.restore();
                drawAmmoQueue();
                drawGameOverMessage();
                if(gameState==='aiming'&&!isDragging&&!activeRock) {
                    const pulse=0.4+Math.sin(Date.now()*0.005)*0.25;
                    ctx.fillStyle=`rgba(180,255,180,${pulse})`; ctx.beginPath();
                    ctx.arc(CATAPULT_X-cameraX, CATAPULT_Y, ROCK_RADIUS+5,0,Math.PI*2); ctx.fill();
                }
            }

            function gameLoop() { update(); render(); requestAnimationFrame(gameLoop); }

            restartBtn.addEventListener('click', (e)=>{ e.stopPropagation(); if(gameState==='won') nextLevel(); else initGame(); });
            window.addEventListener('keydown', (e)=>{ if(e.key==='r'||e.key==='R'){ if(gameState==='won') nextLevel(); else if(gameState==='lost') initGame(); } });

            initGame(); gameLoop();
        })();
    </script>
</body>
</html>
